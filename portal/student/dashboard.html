<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <title>Dashboard — iMathAcademy</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Nunito', sans-serif; background: #F7F8FF; color: #1A1A2E; min-height: 100vh; overflow-x: hidden; }
    :root {
      --green: #43A047; --green-dk: #1B5E20; --green-lt: #E8F5E9;
      --blue: #1E88E5; --blue-dk: #0D47A1; --blue-lt: #E3F2FD;
      --orange: #FB8C00; --orange-dk: #E65100; --orange-lt: #FFF3E0;
      --purple: #8E24AA; --purple-lt: #F3E5F5; --purple-dk: #4A148C;
      --red: #E53935; --red-lt: #FFEBEE; --red-dk: #B71C1C;
      --yellow: #F9A825; --yellow-lt: #FFFDE7; --yellow-dk: #F57F17;
      --pink: #E91E8C; --pink-lt: #FCE4EC; --pink-dk: #880E4F;
      --bg: #fff; --bg2: #F7F8FF; --border: #E8EAF6;
      --text: #1A1A2E; --text2: #4A4A6A; --text3: #9090B0;
      --bottom-nav-h: 64px;
    }

    /* ── LAYOUT ── */
    .portal { display: flex; min-height: 100vh; }

    /* Desktop sidebar */
    .sidebar { width: 220px; flex-shrink: 0; background: var(--bg); border-right: 2px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100; }
    .logo { padding: 18px 16px; border-bottom: 2px solid var(--border); font-family: 'Baloo 2', sans-serif; font-size: 1.1rem; font-weight: 800; color: var(--green-dk); display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 34px; height: 34px; background: var(--green); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    .logo span { color: var(--orange-dk); }
    nav { flex: 1; padding: 10px 0; }
    .nav-sec { font-size: .65rem; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: var(--text3); padding: 8px 16px 2px; margin-top: 4px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; font-size: .875rem; font-weight: 700; color: var(--text2); cursor: pointer; border-left: 3px solid transparent; transition: all .12s; text-decoration: none; }
    .nav-item:hover { background: var(--bg2); }
    .nav-item.active { color: var(--blue-dk); background: var(--blue-lt); border-left-color: var(--blue); }
    .nav-icon { width: 22px; text-align: center; font-size: 1.1rem; }
    .sidebar-user { padding: 12px 16px; border-top: 2px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .av { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .8rem; font-weight: 800; flex-shrink: 0; }
    .av-g { background: var(--green-lt); color: var(--green-dk); border: 2px solid var(--green); }
    .user-name { font-size: .82rem; font-weight: 800; }
    .user-role { font-size: .7rem; color: var(--text3); font-weight: 600; }
    .logout-btn { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--text3); font-size: .9rem; padding: 4px 8px; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }

    /* Main content */
    .main { flex: 1; margin-left: 220px; padding-bottom: 0; }
    .topbar { height: 56px; background: var(--bg); border-bottom: 2px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
    .topbar-title { font-family: 'Baloo 2', sans-serif; font-size: 1rem; font-weight: 800; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .notif-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; position: relative; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
    .notif-dot { position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; background: var(--red); border-radius: 50%; border: 2px solid var(--bg); }
    .content { padding: 16px; }

    /* ── BOTTOM NAV (mobile only) ── */
    .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-nav-h); background: var(--bg); border-top: 2px solid var(--border); z-index: 200; box-shadow: 0 -4px 16px rgba(0,0,0,.08); }
    .bottom-nav-inner { display: flex; height: 100%; }
    .bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; text-decoration: none; border: none; background: none; padding: 4px 0; min-height: 44px; transition: all .12s; }
    .bnav-icon { font-size: 1.3rem; line-height: 1; }
    .bnav-label { font-size: .62rem; font-weight: 700; color: var(--text3); font-family: 'Nunito', sans-serif; }
    .bnav-item.active .bnav-label { color: var(--blue-dk); }
    .bnav-item.active .bnav-icon { transform: scale(1.15); }
    .bnav-badge { position: absolute; top: -2px; right: -4px; background: var(--red); color: #fff; font-size: .55rem; font-weight: 800; width: 14px; height: 14px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .bnav-icon-wrap { position: relative; display: inline-flex; }

    /* ── HERO CARD ── */
    .hero { background: linear-gradient(135deg, #1565C0, #6A1B9A); border-radius: 20px; padding: 20px; margin-bottom: 14px; color: #fff; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; top: -30px; right: -30px; width: 140px; height: 140px; border-radius: 50%; background: rgba(255,255,255,.06); }
    .hero::after  { content: ''; position: absolute; bottom: -40px; right: 60px; width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,.04); }
    .hero-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; gap: 10px; }
    .hero-greeting { font-size: .82rem; opacity: .75; margin-bottom: 3px; }
    .hero-name { font-size: 1.2rem; font-weight: 800; margin-bottom: 3px; }
    .hero-sub { font-size: .75rem; opacity: .7; }
    .streak-box { background: rgba(255,255,255,.15); border-radius: 12px; padding: 8px 12px; text-align: center; border: 1px solid rgba(255,255,255,.2); flex-shrink: 0; }
    .streak-icon { font-size: 1.3rem; }
    .streak-num { font-size: 1.1rem; font-weight: 800; line-height: 1.1; }
    .streak-label { font-size: .65rem; opacity: .8; }
    /* XP bar */
    .xp-wrap { }
    .xp-labels { display: flex; justify-content: space-between; font-size: .72rem; opacity: .8; margin-bottom: 5px; }
    .xp-bar { height: 10px; background: rgba(255,255,255,.2); border-radius: 20px; overflow: hidden; }
    .xp-fill { height: 100%; background: linear-gradient(90deg, #FFD600, #FF6F00); border-radius: 20px; transition: width .5s ease; }
    .xp-hint { font-size: .7rem; opacity: .7; margin-top: 4px; text-align: right; }

    /* ── DAILY MISSION ── */
    .section-title { font-size: .72rem; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; color: var(--text3); margin-bottom: 10px; }
    .mission-card { background: var(--bg); border: 2px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 14px; }
    .mission-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .mission-title { font-size: .95rem; font-weight: 800; }
    .mission-timer { font-size: .72rem; color: var(--text3); font-weight: 600; }
    .mission-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .mission-item:last-child { border-bottom: none; }
    .mission-icon { font-size: 1.2rem; width: 28px; text-align: center; flex-shrink: 0; }
    .mission-info { flex: 1; }
    .mission-name { font-size: .875rem; font-weight: 700; }
    .mission-desc { font-size: .75rem; color: var(--text2); margin-top: 2px; }
    .mission-xp { font-size: .82rem; font-weight: 800; color: var(--orange-dk); white-space: nowrap; }
    .mission-done { color: var(--green-dk); }

    /* ── ACTION BUTTONS ── */
    .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .action-btn { border: none; border-radius: 16px; padding: 16px 14px; cursor: pointer; text-align: left; position: relative; overflow: hidden; min-height: 90px; display: flex; flex-direction: column; justify-content: flex-end; transition: transform .15s, box-shadow .15s; -webkit-user-select: none; }
    .action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.15); }
    .action-btn:active { transform: scale(.97); }
    .action-emoji { font-size: 1.8rem; margin-bottom: 6px; }
    .action-name { font-size: .875rem; font-weight: 800; color: #fff; }
    .action-sub  { font-size: .72rem; color: rgba(255,255,255,.8); margin-top: 2px; }
    .action-badge { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,.25); color: #fff; font-size: .65rem; font-weight: 800; padding: 2px 8px; border-radius: 20px; }
    .action-lock { position: absolute; top: 10px; right: 10px; font-size: 1rem; }

    /* ── PROGRESS ── */
    .progress-card { background: var(--bg); border: 2px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 14px; }
    .progress-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .progress-item:last-child { margin-bottom: 0; }
    .progress-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
    .progress-label { font-size: .82rem; font-weight: 700; flex: 1; }
    .progress-bar-wrap { flex: 2; height: 6px; background: var(--border); border-radius: 20px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 20px; transition: width .5s ease; }
    .progress-pct { font-size: .75rem; font-weight: 800; width: 32px; text-align: right; }

    /* ── BADGES ── */
    .badges-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; -ms-overflow-style: none; }
    .badges-row::-webkit-scrollbar { display: none; }
    .badge-item { flex-shrink: 0; text-align: center; padding: 10px; border-radius: 12px; border: 2px solid var(--border); background: var(--bg); min-width: 70px; }
    .badge-item.earned { border-color: var(--yellow); background: var(--yellow-lt); }
    .badge-item.locked { opacity: .4; }
    .badge-emoji { font-size: 1.5rem; }
    .badge-name { font-size: .65rem; font-weight: 700; margin-top: 4px; color: var(--text2); }
    .badge-hint { background: var(--blue-lt); border: 1.5px solid var(--blue); border-radius: 10px; padding: 8px 12px; font-size: .78rem; color: var(--blue-dk); font-weight: 700; margin-bottom: 14px; }

    /* ── JR STICKER BOOK ── */
    .sticker-card { background: linear-gradient(135deg, #FFF9C4, #E8F5E9); border: 2px solid #4CAF50; border-radius: 16px; padding: 14px; margin-bottom: 14px; }
    .sticker-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .sticker-title { font-size: .95rem; font-weight: 800; color: var(--green-dk); }
    .sticker-count { font-size: .78rem; font-weight: 700; color: var(--green); }
    .stickers-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
    .sticker-em { font-size: 1.8rem; }
    .sticker-locked { font-size: 1.8rem; opacity: .2; }
    .sticker-hint { font-size: .78rem; color: var(--green-dk); font-weight: 600; }

    /* ── MASCOT ── */
    .mascot-card { background: linear-gradient(135deg, var(--pink-lt), var(--purple-lt)); border: 2px solid #CE93D8; border-radius: 16px; padding: 14px; display: flex; gap: 12px; align-items: flex-start; margin-bottom: 14px; }
    .mascot-em { font-size: 2.5rem; flex-shrink: 0; }
    .mascot-name { font-size: .78rem; font-weight: 800; color: var(--purple-dk); margin-bottom: 4px; }
    .mascot-msg { font-size: .82rem; color: var(--purple-dk); line-height: 1.6; font-style: italic; }

    /* ── SR LEADERBOARD ── */
    .lb-card { background: var(--bg); border: 2px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 14px; }
    .lb-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .lb-item:last-child { border-bottom: none; }
    .lb-rank { font-size: 1rem; width: 24px; text-align: center; flex-shrink: 0; }
    .lb-name { flex: 1; font-size: .875rem; font-weight: 700; }
    .lb-xp { font-size: .82rem; font-weight: 800; color: var(--orange-dk); }
    .lb-you { background: var(--blue-lt); border-radius: 8px; padding: 8px 10px; border: 1.5px solid var(--blue); }
    .lb-you .lb-name { color: var(--blue-dk); }
    .lb-hint { margin-top: 8px; font-size: .75rem; color: var(--blue-dk); font-weight: 700; background: var(--blue-lt); border-radius: 8px; padding: 6px 10px; }

    /* ── SR TITLE ── */
    .title-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--blue-dk); color: #fff; padding: 5px 14px; border-radius: 20px; font-size: .8rem; font-weight: 800; margin-bottom: 14px; }

    /* ── NOTIFICATIONS ── */
    .notif-panel { display: none; position: fixed; top: 56px; right: 0; width: min(360px, 100vw); background: var(--bg); border-left: 2px solid var(--border); border-bottom: 2px solid var(--border); border-radius: 0 0 0 16px; box-shadow: -4px 4px 20px rgba(0,0,0,.1); z-index: 300; max-height: calc(100vh - 56px); overflow-y: auto; }
    .notif-panel.open { display: block; }
    .notif-header { padding: 14px 16px; font-weight: 800; border-bottom: 1px solid var(--border); font-size: .95rem; }
    .notif-item { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .notif-item:last-child { border-bottom: none; }
    .notif-item-title { font-size: .82rem; font-weight: 700; margin-bottom: 2px; }
    .notif-item-sub   { font-size: .75rem; color: var(--text2); }
    .notif-empty { padding: 24px; text-align: center; color: var(--text3); font-size: .875rem; }

    /* ── TOAST ── */
    .toast-wrap { position: fixed; bottom: calc(var(--bottom-nav-h) + 16px); right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 6px; }
    .toast { padding: 10px 16px; border-radius: 12px; font-size: .82rem; font-weight: 700; box-shadow: 0 4px 16px rgba(0,0,0,.15); animation: slideUp .3s ease; color: #fff; }
    .toast-success { background: var(--green-dk); }
    .toast-error   { background: var(--red-dk); }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding-bottom: var(--bottom-nav-h); }
      .topbar { height: 52px; padding: 0 14px; }
      .content { padding: 12px; }
      .bottom-nav { display: block; }
      .notif-panel { width: 100vw; border-left: none; border-radius: 0; }
      .hero { border-radius: 16px; padding: 16px; }
      .hero-name { font-size: 1.1rem; }
      .actions-grid { gap: 8px; }
      .action-btn { min-height: 82px; padding: 12px 12px; }
    }

    @media (min-width: 769px) {
      .toast-wrap { bottom: 24px; }
    }
  </style>
</head>

<script>
const SUPABASE_URL = 'https://bhullfoajenhkxlkiubs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJodWxsZm9hamVuaGt4bGtpdWJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MzcwMjUsImV4cCI6MjA5MzExMzAyNX0.RUcKFGluRhu9H8sZdLb-ow4ORoCd2-oIzYXJqyNZ5Uc';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── HELPERS ─────────────────────────────────────────────────
function initials(name) { return (name||'S').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2); }
function greet() {
  const h = new Date().getHours();
  return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
}
function toast(msg, type='success') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── AGE GROUP ────────────────────────────────────────────────
function getGroup(age) {
  if (!age || age <= 7)  return 'tiny';
  if (age <= 10)         return 'rising';
  return 'champions';
}

function groupLabel(group) {
  return group === 'tiny' ? '🐣 Tiny Champs' : group === 'rising' ? '🌟 Rising Stars' : '🚀 Champions';
}

// ── SUBSCRIPTION CHECK ───────────────────────────────────────
async function checkSubscription(userId) {
  const { data: subs } = await sb.from('subscriptions')
    .select('id, expires_at, status')
    .eq('student_id', userId)
    .eq('status', 'active')
    .order('expires_at', { ascending: false })
    .limit(1);
  const sub = subs?.[0];
  const expired = !sub || new Date(sub.expires_at) < new Date();
  if (expired) { window.location.href = 'subscription.html'; return false; }
  return true;
}

// ── NOTIFICATIONS ────────────────────────────────────────────
function toggleNotif() {
  const panel = document.getElementById('notifPanel');
  panel.classList.toggle('open');
}
document.addEventListener('click', e => {
  const panel = document.getElementById('notifPanel');
  const btn   = document.getElementById('notifBtn');
  if (panel.classList.contains('open') && !panel.contains(e.target) && !btn.contains(e.target)) {
    panel.classList.remove('open');
  }
});

async function loadNotifications(userId) {
  const { data } = await sb.from('notifications')
    .select('*').eq('user_id', userId)
    .order('created_at', { ascending: false }).limit(10);

  const list = document.getElementById('notifList');
  const dot  = document.getElementById('notifDot');
  if (!data?.length) {
    list.innerHTML = '<div class="notif-empty">No notifications yet</div>';
    return;
  }
  dot.style.display = 'block';
  list.innerHTML = data.map(n => `
    <div class="notif-item">
      <div class="notif-item-title">${n.title}</div>
      <div class="notif-item-sub">${n.message || ''}</div>
    </div>`).join('');
}

function getMascotMessage(streak, xpPct) {
  if (xpPct >= 90) return "You are SO close to filling the power bar! Just one more session! ✨";
  if (streak >= 5) return `${streak} days in a row — you are AMAZING! Keep going, superstar! 🌟`;
  if (streak === 0) return "I missed you! Come on, let's do some maths magic together today! 🎉";
  return "Just 2 more right answers and the PUZZLE door opens! You can do it! 🚪✨";
}

// ── LOAD DATA ────────────────────────────────────────────────
async function loadStats(userId) {
  const stats = { homeworkPending: 0, practiceToday: false, stickers: 5 };
  try {
    // Homework pending
    const { data: batches } = await sb.from('batch_students').select('batch_id').eq('student_id', userId);
    if (batches?.length) {
      const { data: hw } = await sb.from('homework')
        .select('id').in('batch_id', batches.map(b=>b.batch_id)).eq('is_active', true);
      stats.homeworkPending = hw?.length || 0;
      if (stats.homeworkPending > 0) document.getElementById('hwBadge').style.display = 'flex';
    }
  } catch(e) { console.error('stats error:', e); }
  return stats;
}

// ── AUTH + INIT ──────────────────────────────────────────────
async function logout() {
  await sb.auth.signOut();
  window.location.href = '../../login.html';
}

async function init() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = '../../login.html'; return; }

    // Subscription check
    const active = await checkSubscription(session.user.id);
    if (!active) return;

    // Load profile
    const { data: profile, error } = await sb.from('users').select('*').eq('id', session.user.id).single();
    if (error || !profile) { window.location.href = '../../login.html'; return; }

    // Determine age group
    const group = getGroup(profile.age || null);

    // Load stats and notifications in parallel
    const [stats] = await Promise.all([
      loadStats(session.user.id),
      loadNotifications(session.user.id),
    ]);

    // Build dashboard
    buildDashboard(profile, stats, group);

  } catch(err) {
    console.error('Dashboard init error:', err);
    document.getElementById('mainContent').innerHTML = `
      <div style="text-align:center;padding:40px;color:var(--red)">
        Something went wrong. <a href="../../login.html" style="color:var(--blue)">Please login again</a>
      </div>`;
  }
}

init();
