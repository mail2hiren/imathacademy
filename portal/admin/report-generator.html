<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Report — iMathAcademy</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
  <style>
    /* ── SCREEN STYLES ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #F7F8FF;
      color: #1A1A2E;
    }

    .generator-shell {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px;
    }

    .gen-header {
      background: linear-gradient(135deg, #1B5E20, #2E7D32);
      border-radius: 18px;
      padding: 24px 28px;
      color: #fff;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .gen-title {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
    }

    .gen-sub {
      font-size: 0.85rem;
      opacity: 0.85;
      margin-top: 4px;
    }

    .controls {
      background: #fff;
      border: 2px solid #E8EAF6;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .ctrl-group { display: flex; flex-direction: column; gap: 6px; }
    .ctrl-label { font-size: 0.8rem; font-weight: 800; color: #4A4A6A; }
    .ctrl-input, .ctrl-select {
      padding: 9px 14px;
      border: 2px solid #E8EAF6;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      color: #1A1A2E;
      background: #fff;
      outline: none;
    }
    .ctrl-input:focus, .ctrl-select:focus { border-color: #43A047; }

    .btn {
      padding: 10px 22px;
      border-radius: 30px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 800;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-green  { background: #43A047; color: #fff; }
    .btn-blue   { background: #1E88E5; color: #fff; }
    .btn-ghost  { background: #F7F8FF; color: #4A4A6A; border: 2px solid #E8EAF6; }
    .btn:hover  { opacity: 0.88; transform: translateY(-1px); }

    /* ── REPORT PREVIEW ── */
    #reportPreview {
      background: #fff;
      border: 2px solid #E8EAF6;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    /* ── PRINT / PDF STYLES ── */
    @media print {
      body { background: #fff !important; }
      .generator-shell { padding: 0 !important; }
      .gen-header, .controls, .print-actions { display: none !important; }
      #reportPreview {
        border: none !important;
        border-radius: 0 !important;
        margin: 0 !important;
      }
      .report-page { box-shadow: none !important; }
    }

    /* ── REPORT PAGE STYLES ── */
    .report-page {
      padding: 36px 40px;
      font-family: 'Nunito', sans-serif;
      color: #1A1A2E;
      max-width: 720px;
      margin: 0 auto;
    }

    .report-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 20px;
      border-bottom: 3px solid #1B5E20;
      margin-bottom: 24px;
    }

    .report-logo {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: #1B5E20;
    }
    .report-logo span { color: #E65100; }

    .report-meta {
      text-align: right;
      font-size: 0.78rem;
      color: #9090B0;
      font-weight: 600;
    }

    .report-title-section {
      background: linear-gradient(135deg, #1B5E20, #2E7D32);
      border-radius: 16px;
      padding: 20px 24px;
      color: #fff;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .student-name-big {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .student-detail {
      font-size: 0.85rem;
      opacity: 0.9;
      font-weight: 600;
    }

    .belt-badge-lg {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
    }

    /* ── STAT ROW ── */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-box {
      border-radius: 14px;
      padding: 14px;
      text-align: center;
      border: 2px solid transparent;
    }

    .stat-box-n {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .stat-box-l {
      font-size: 0.72rem;
      font-weight: 700;
    }

    /* ── SECTION ── */
    .report-section {
      margin-bottom: 24px;
    }

    .section-heading {
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #9090B0;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid #E8EAF6;
    }

    /* ── TOPIC BARS ── */
    .topic-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .tb-name {
      width: 180px;
      font-size: 0.82rem;
      font-weight: 700;
      color: #1A1A2E;
      flex-shrink: 0;
    }

    .tb-track {
      flex: 1;
      height: 10px;
      background: #F7F8FF;
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid #E8EAF6;
    }

    .tb-fill {
      height: 100%;
      border-radius: 5px;
    }

    .tb-pct {
      width: 40px;
      text-align: right;
      font-size: 0.82rem;
      font-weight: 800;
      flex-shrink: 0;
    }

    .tb-sessions {
      width: 60px;
      text-align: right;
      font-size: 0.72rem;
      color: #9090B0;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* ── ATTENDANCE CALENDAR ── */
    .att-calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0,1fr));
      gap: 4px;
    }

    .att-day-hdr {
      font-size: 0.62rem;
      font-weight: 800;
      color: #9090B0;
      text-align: center;
      padding: 3px 0;
    }

    .att-day-cell {
      border-radius: 5px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.62rem;
      font-weight: 800;
    }

    .att-present { background: #43A047; color: #fff; }
    .att-absent  { background: #FFEBEE; color: #E53935; border: 1px solid #FFCDD2; }
    .att-noclass { background: #F7F8FF; color: #9090B0; border: 1px solid #E8EAF6; }

    /* ── BADGES ── */
    .badges-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: #FFFDE7;
      border: 1.5px solid #FFE082;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 800;
      color: #F57F17;
    }

    /* ── XP PROGRESS ── */
    .xp-report-bar {
      background: linear-gradient(135deg, #1B5E20, #2E7D32);
      border-radius: 12px;
      padding: 14px 18px;
      color: #fff;
      margin-bottom: 16px;

      height: 10px;
      background: rgba(255,255,255,0.25);
      border-radius: 5px;
      overflow: hidden;
      margin: 8px 0;

    .xp-bar-fill {
      height: 100%;
      background: #F9A825;
      border-radius: 5px;
    }

    /* ── TEACHER COMMENTS ── */
    .teacher-comments {
      background: #E3F2FD;
      border: 2px solid #90CAF9;
      border-radius: 12px;
      padding: 16px;
    }

    .tc-label {
      font-size: 0.75rem;
      font-weight: 800;
      color: #0D47A1;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .tc-text {
      font-size: 0.875rem;
      color: #1565C0;
      font-weight: 500;
      line-height: 1.6;
    }

    /* ── GOALS ── */
    .goal-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.875rem;
      color: #4A4A6A;
      font-weight: 500;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .goal-arrow {
      color: #43A047;
      font-weight: 900;
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    .report-footer {
      border-top: 2px solid #E8EAF6;
      padding-top: 16px;
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.72rem;
      color: #9090B0;
    }

    .report-stamp {
      background: #E8F5E9;
      border: 2px solid #A5D6A7;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.72rem;
      font-weight: 800;
      color: #1B5E20;
    }
  </style>
</head>

        ${student.badges.map(b => `<div class="badge-chip">${b}</div>`).join('')}

    </div>

    <!-- TEACHER COMMENTS -->
    <div class="report-section">
      <div class="section-heading">Teacher comments</div>
      <div class="teacher-comments">

    <!-- GOALS -->
    <div class="report-section">

        <div class="goal-row">
          <span class="goal-arrow">→</span>

    <!-- FOOTER -->
    <div class="report-footer">
      <div>
        <div style="font-weight:700;color:#1A1A2E;font-size:.78rem">iMathAcademy</div>
        <div>hello@imathacademy.com · mail2hiren.github.io/imathacademy</div>
      </div>
      <div class="report-stamp">✓ Auto-generated report</div>
    </div>
  `;
}

// ── CALENDAR CELLS ─────────────────────────────────────────
function generateCalendarCells(classDays, absentDays) {
  const DAYS_IN_MAY = 31;
  const START_PAD   = 3; // May 2025 starts on Thursday
  let cells = '';

  // Padding
  for (let i = 0; i < START_PAD; i++) {
    cells += `<div class="att-day-cell att-noclass"></div>`;
  }

  for (let d = 1; d <= DAYS_IN_MAY; d++) {
    if (classDays.includes(d)) {
      if (absentDays.includes(d)) {
        cells += `<div class="att-day-cell att-absent">${d}</div>`;
      } else {
        cells += `<div class="att-day-cell att-present">${d}</div>`;
      }
    } else {
      cells += `<div class="att-day-cell att-noclass" style="color:#C5CAE9;font-size:.58rem">${d}</div>`;
    }
  }
  return cells;
}

// ── DOWNLOAD PDF ───────────────────────────────────────────
function downloadPDF() {
  const student  = document.getElementById('ctrlStudent');
  const month    = document.getElementById('ctrlMonth').value;
  const name     = student.options[student.selectedIndex].text.split(' — ')[0];

  // Set document title for PDF filename
  const originalTitle = document.title;
  document.title      = `iMathAcademy_Report_${name.replace(' ','_')}_${month.replace(' ','_')}`;

  // Print (browser converts to PDF)
  window.print();

  // Restore title
  document.title = originalTitle;
}

async function loadStudentData(studentId, month) {
  try {
    const { data: student } = await sb
      .from('student_progress_summary')
      .select('*')
      .eq('id', studentId)
      .single();

    const { data: topics } = await sb
      .from('student_weak_topics')

      .eq('student_id', studentId);

    const { data: badges } = await sb
      .from('badges')
      .select('badge_label, badge_icon')
      .eq('student_id', studentId);
