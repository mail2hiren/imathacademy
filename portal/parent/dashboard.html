<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <title>Parent Dashboard — iMathAcademy</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Nunito', sans-serif; background: #F7F8FF; color: #1A1A2E; min-height: 100vh; }
    :root {
      --green: #43A047; --green-dk: #1B5E20; --green-lt: #E8F5E9;
      --blue: #1E88E5; --blue-dk: #0D47A1; --blue-lt: #E3F2FD;
      --orange: #FB8C00; --orange-dk: #E65100; --orange-lt: #FFF3E0;
      --purple: #8E24AA; --purple-lt: #F3E5F5; --purple-dk: #4A148C;
      --red: #E53935; --red-lt: #FFEBEE;
      --yellow: #F9A825; --yellow-lt: #FFFDE7;
      --pink: #E91E8C; --pink-lt: #FCE4EC; --pink-dk: #880E4F;
      --bg: #fff; --bg2: #F7F8FF; --border: #E8EAF6;
      --text: #1A1A2E; --text2: #4A4A6A; --text3: #9090B0;
      --bottom-nav-h: 64px;
    }

    /* ── LAYOUT ── */
    .portal { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; flex-shrink: 0; background: var(--bg); border-right: 2px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 300; overflow-y: auto; }
    .logo { padding: 18px 16px; border-bottom: 2px solid var(--border); font-family: 'Baloo 2', sans-serif; font-size: 1.1rem; font-weight: 800; color: var(--green-dk); display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 34px; height: 34px; background: var(--green); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    .logo span { color: var(--orange-dk); }
    nav { flex: 1; padding: 10px 0; }
    .nav-sec { font-size: .65rem; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: var(--text3); padding: 8px 16px 2px; margin-top: 4px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; font-size: .875rem; font-weight: 700; color: var(--text2); cursor: pointer; border-left: 3px solid transparent; transition: all .12s; text-decoration: none; }
    .nav-item:hover { background: var(--bg2); }
    .nav-item.active { color: var(--blue-dk); background: var(--blue-lt); border-left-color: var(--blue); }
    .nav-icon { width: 22px; text-align: center; font-size: 1.1rem; }
    .sidebar-user { padding: 12px 16px; border-top: 2px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .av { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .8rem; font-weight: 800; flex-shrink: 0; background: var(--pink-lt); color: var(--pink-dk); border: 2px solid var(--pink); }
    .sidebar-name { font-size: .82rem; font-weight: 800; }
    .sidebar-role { font-size: .7rem; color: var(--text3); }
    .logout-btn { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--text3); min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .main { flex: 1; margin-left: 220px; }
    .topbar { height: 56px; background: var(--bg); border-bottom: 2px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-family: 'Baloo 2', sans-serif; font-size: 1rem; font-weight: 800; }
    .content { padding: 16px; }

    /* ── BOTTOM NAV (mobile) ── */
    .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-nav-h); background: var(--bg); border-top: 2px solid var(--border); z-index: 200; }
    .bottom-nav-inner { display: flex; height: 100%; }
    .bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; text-decoration: none; border: none; background: none; padding: 4px 0; min-height: 44px; touch-action: manipulation; }
    .bnav-icon { font-size: 1.3rem; }
    .bnav-label { font-size: .62rem; font-weight: 700; color: var(--text3); font-family: 'Nunito', sans-serif; }
    .bnav-item.active .bnav-label { color: var(--blue-dk); }

    /* ── CHILD SELECTOR ── */
    .child-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .child-chip { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border: 2px solid var(--border); border-radius: 14px; cursor: pointer; transition: all .12s; touch-action: manipulation; background: var(--bg); }
    .child-chip.active { border-color: var(--blue); background: var(--blue-lt); }
    .child-av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .9rem; font-weight: 800; flex-shrink: 0; }
    .child-name { font-size: .875rem; font-weight: 800; }
    .child-level { font-size: .72rem; color: var(--text2); margin-top: 1px; }

    /* ── SECTION TITLE ── */
    .sec-title { font-size: .72rem; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; color: var(--text3); margin-bottom: 10px; }

    /* ── CARDS ── */
    .card { background: var(--bg); border: 2px solid var(--border); border-radius: 16px; padding: 14px 16px; margin-bottom: 12px; }

    /* ── MOTIVATIONAL BANNER ── */
    .journey-banner { border-radius: 18px; padding: 18px; margin-bottom: 12px; color: #fff; position: relative; overflow: hidden; }
    .journey-banner::before { content:''; position:absolute; top:-20px; right:-20px; width:100px; height:100px; border-radius:50%; background:rgba(255,255,255,.07); }
    .journey-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
    .journey-text h2 { font-size: 1rem; font-weight: 800; margin-bottom: 4px; }
    .journey-text p  { font-size: .78rem; opacity: .85; line-height: 1.6; }
    .journey-pct { background: rgba(255,255,255,.15); border: 1.5px solid rgba(255,255,255,.3); border-radius: 12px; padding: 10px 14px; text-align: center; flex-shrink: 0; }
    .journey-pct-num { font-size: 1.4rem; font-weight: 800; }
    .journey-pct-lbl { font-size: .65rem; opacity: .8; }
    .journey-bar-wrap { }
    .journey-bar-labels { display: flex; justify-content: space-between; font-size: .68rem; opacity: .8; margin-bottom: 4px; }
    .journey-bar { height: 8px; background: rgba(255,255,255,.2); border-radius: 20px; overflow: hidden; }
    .journey-bar-fill { height: 100%; border-radius: 20px; background: linear-gradient(90deg,#FFD600,#FF6F00); transition: width .5s ease; }

    /* ── TODAY'S SNAPSHOT ── */
    .snapshot-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .snap-box { background: var(--bg); border: 2px solid var(--border); border-radius: 12px; padding: 10px; text-align: center; }
    .snap-num { font-size: 1.3rem; font-weight: 800; }
    .snap-lbl { font-size: .65rem; color: var(--text3); font-weight: 600; margin-top: 2px; }

    /* ── PLAIN ENGLISH SUMMARY ── */
    .summary-box { border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
    .summary-title { font-size: .78rem; font-weight: 800; margin-bottom: 5px; }
    .summary-text  { font-size: .82rem; line-height: 1.7; }

    /* ── CONVERSATION STARTERS ── */
    .conv-box { border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; }
    .conv-title { font-size: .78rem; font-weight: 800; margin-bottom: 8px; }
    .conv-item { font-size: .82rem; line-height: 1.7; display: flex; gap: 8px; }

    /* ── 12-WEEK CALENDAR ── */
    .weeks-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 6px; margin-bottom: 12px; }
    .week-box { text-align: center; padding: 8px 4px; border-radius: 10px; border: 2px solid var(--border); }
    .week-box.done    { background: var(--green-lt); border-color: var(--green); }
    .week-box.current { background: var(--blue-lt);  border-color: var(--blue); border-width: 2px; }
    .week-box.locked  { background: var(--bg2); opacity: .5; }
    .week-box.milestone { background: var(--yellow-lt); border-color: var(--yellow); }
    .week-num  { font-size: .75rem; font-weight: 800; }
    .week-icon { font-size: .75rem; margin-top: 2px; }

    /* ── CONCEPT MILESTONES ── */
    .concept-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .concept-item:last-child { border-bottom: none; }
    .concept-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
    .concept-info { flex: 1; }
    .concept-name { font-size: .875rem; font-weight: 700; }
    .concept-sub  { font-size: .72rem; color: var(--text2); margin-top: 2px; }
    .concept-bar-wrap { flex: 2; height: 5px; background: var(--border); border-radius: 20px; overflow: hidden; }
    .concept-bar-fill { height: 100%; border-radius: 20px; }
    .concept-pct { font-size: .72rem; font-weight: 800; width: 32px; text-align: right; }
    .concept-pill { font-size: .65rem; font-weight: 800; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }

    /* ── BADGES ── */
    .badges-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .badges-scroll::-webkit-scrollbar { display: none; }
    .badge-item { flex-shrink: 0; text-align: center; padding: 10px; border-radius: 12px; border: 2px solid var(--border); background: var(--bg); min-width: 70px; }
    .badge-item.earned { border-color: var(--yellow); background: var(--yellow-lt); }
    .badge-item.locked { opacity: .35; }
    .badge-emoji { font-size: 1.5rem; }
    .badge-name  { font-size: .65rem; font-weight: 700; margin-top: 4px; color: var(--text2); }
    .badge-date  { font-size: .6rem; color: var(--text3); margin-top: 2px; }

    /* ── ACTION TIPS ── */
    .tip-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .tip-item:last-child { border-bottom: none; }
    .tip-icon { font-size: 1.2rem; flex-shrink: 0; width: 24px; text-align: center; }
    .tip-title { font-size: .875rem; font-weight: 700; margin-bottom: 3px; }
    .tip-desc  { font-size: .78rem; color: var(--text2); line-height: 1.6; }

    /* ── UPCOMING MILESTONES ── */
    .milestone-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .milestone-item:last-child { border-bottom: none; }
    .milestone-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
    .milestone-text { flex: 1; font-size: .82rem; }
    .milestone-when { font-size: .72rem; font-weight: 800; white-space: nowrap; }

    /* ── HOW IT WORKS (explainer) ── */
    .explainer-step { display: flex; gap: 12px; align-items: flex-start; padding: 10px 12px; background: var(--bg2); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px; }
    .step-num { background: var(--blue); color: #fff; font-size: .78rem; font-weight: 800; padding: 3px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
    .step-title { font-size: .875rem; font-weight: 700; margin-bottom: 3px; }
    .step-desc  { font-size: .78rem; color: var(--text2); line-height: 1.6; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; margin-bottom: 16px; padding-bottom: 2px; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn { padding: 7px 16px; border-radius: 20px; border: 2px solid var(--border); background: var(--bg); font-size: .82rem; font-weight: 700; cursor: pointer; white-space: nowrap; touch-action: manipulation; transition: all .12s; font-family: 'Nunito', sans-serif; }
    .tab-btn.active { background: var(--blue-lt); border-color: var(--blue); color: var(--blue-dk); }

    /* ── LOADER ── */
    .loader { text-align: center; padding: 60px 20px; color: var(--text3); }
    .spinner { width: 36px; height: 36px; border: 4px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding-bottom: var(--bottom-nav-h); }
      .topbar { height: 52px; padding: 0 14px; }
      .content { padding: 12px; }
      .bottom-nav { display: block; }
      .snapshot-grid { grid-template-columns: 1fr 1fr; }
      .weeks-grid { grid-template-columns: repeat(4,1fr); }
      .journey-pct-num { font-size: 1.2rem; }
    }
    @media (max-width: 360px) {
      .snapshot-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
    }
  
    /* ── MOBILE SIDEBAR ── */
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;}
    .sidebar-overlay.show{display:block;}
    @media(max-width:768px){
      .hamburger-mobile{display:flex!important;}
      .sidebar{transform:translateX(-100%);transition:transform .25s ease;z-index:300;}
      .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,.18);}
      .main,.content-wrap,.body{margin-left:0!important;}
    }
    @media(min-width:769px){
      .sidebar{transform:translateX(0)!important;}
      .sidebar-overlay{display:none!important;}
      .hamburger-mobile{display:none!important;}
    }
    </style>
</head>

<script>

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJodWxsZm9hamVuaGt4bGtpdWJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MzcwMjUsImV4cCI6MjA5MzExMzAyNX0.RUcKFGluRhu9H8sZdLb-ow4ORoCd2-oIzYXJqyNZ5Uc';

const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let parentProfile = null, children = [], activeChild = null, activeTab = 'progress';

// ── HELPERS ──────────────────────────────────────────────────
function initials(name) { return (name||'P').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2); }
function fmt(date) { return date ? new Date(date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—'; }
function fmtShort(date) { return date ? new Date(date).toLocaleDateString('en-IN',{day:'numeric',month:'short'}) : '—'; }

function getGroupLabel(p) {
  const g = p.age_group || levelGroup(p.current_level||1);
  return g==='tiny'?'🐣 Tiny Champs':g==='rising'?'🌟 Rising Stars':'🚀 Champions';
}
function levelGroup(lv) { return lv<=1?'tiny':lv<=4?'rising':'champions'; }

function getWeeksInLevel(enrollDate) {
  if (!enrollDate) return { week: 1, total: 12, pct: 8 };
  const diff = new Date() - new Date(enrollDate);
  const weeks = Math.max(1, Math.min(12, Math.ceil(diff / (7*24*3600*1000))));
  return { week: weeks, total: 12, pct: Math.round(weeks/12*100) };
}

function estimateCompletion(enrollDate) {
  const d = new Date(enrollDate || new Date());
  d.setDate(d.getDate() + (12 * 7));
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
}

const BADGE_DEFS = [
  { key:'speed_star',    emoji:'⭐', name:'Speed star'   },
  { key:'perfect_score', emoji:'🎯', name:'Perfect!'     },
  { key:'streak_5',      emoji:'🔥', name:'5-day fire'   },
  { key:'streak_7',      emoji:'🥇', name:'7-day legend' },
  { key:'puzzle_pro',    emoji:'🧩', name:'Puzzle pro'   },
  { key:'top_batch',     emoji:'🏆', name:'Top of batch' },
  { key:'abacus_ninja',  emoji:'🥷', name:'Abacus ninja' },
];

// ── LEVEL CONCEPT MAP ────────────────────────────────────────
const LEVEL_CONCEPTS = {
  0: ['Number recognition','Counting 1–10','Simple addition 1–9'],
  1: ['Big friends addition','Small friends addition','Big friends subtraction','Small friends subtraction','Level 1 revision'],
  2: ['Combination addition','Combination subtraction','3-digit practice','Level 2 revision'],
  3: ['Family formula addition','Family formula subtraction','4-digit practice','Level 3 revision'],
  4: ['Anzan introduction','Mental addition','Mental subtraction','Level 4 revision'],
  5: ['Multiplication 2×1','Multiplication 3×1','6-digit add/sub','Level 5 revision'],
  6: ['Division 2÷1','7-digit add/sub','Level 6 revision'],
  7: ['Multiplication 4×1','Multiplication 2×2','Division 4÷1','8-digit add/sub','Level 7 revision'],
  8: ['Decimal operations','Negative numbers','Advanced add/sub','Level 8 revision'],
};

// ── RENDER DASHBOARD ─────────────────────────────────────────
function renderDashboard(child, stats) {
  const lv = child.current_level || 1;
  const concepts = LEVEL_CONCEPTS[lv] || LEVEL_CONCEPTS[1];
  const journey = getWeeksInLevel(child.created_at);
  const group = child.age_group || levelGroup(lv);
  const xp = child.xp_points || 0;
  const streak = child.streak_days || 0;
  const xpNext = (Math.floor(xp/500)+1)*500;
  const xpPct = Math.min(100, Math.round((xp%500)/500*100));
  const badges = stats.badges || [];
  const earnedBadgeKeys = new Set(badges.map(b=>b.badge_type||b.key));
  const hw = stats.homeworkPending || 0;
  const practiceToday = stats.practiceToday || false;
  const weeklyXP = stats.weeklyXP || 0;
  const puzzlesSolved = stats.puzzlesSolved || 0;

  // Concept progress — simulate based on level and XP
  const conceptProgress = concepts.map((c,i) => {
    const isDone = i < Math.floor(journey.week/12 * concepts.length * 0.7);
    const isCurrent = !isDone && i === Math.floor(journey.week/12 * concepts.length * 0.7);
    const pct = isDone ? 100 : isCurrent ? Math.min(95, (xpPct + 10)) : 0;
    return { name:c, pct, isDone, isCurrent };
  });

  // Action tips based on child data
  const tips = buildActionTips(child, stats, journey, group);
  const milestones = buildMilestones(child, stats, journey, streak, badges);
  const convStarters = buildConvStarters(child, stats, group);

  // Show parent notes
  const notesSection = document.getElementById('parentNotesSection');
  const notesList = document.getElementById('parentNotesList');
  if (notesSection && notesList && stats.parentNotes?.length) {
    notesList.innerHTML = stats.parentNotes.map(n => `
      <div style="background:#E8F5E9;border:1.5px solid #43A047;border-radius:12px;padding:12px 14px;margin-bottom:8px;">
        <div style="font-size:.72rem;font-weight:800;color:#1B5E20;margin-bottom:4px;">${n.title}</div>
        <div style="font-size:.82rem;color:#1B5E20;line-height:1.7;">${n.parent_note}</div>
      </div>`).join('');
    notesSection.style.display = 'block';
  }

  document.getElementById('mainContent').innerHTML = `

    <!-- Child selector -->
    ${children.length > 1 ? `
    <div class="child-selector">
      ${children.map(c=>`
        <div class="child-chip ${c.id===child.id?'active':''}" onclick="selectChild('${c.id}')">
          <div class="child-av" style="background:${c.id===child.id?'#E3F2FD':'#F3E5F5'};color:${c.id===child.id?'#0D47A1':'#4A148C'};border:2px solid ${c.id===child.id?'#1E88E5':'#9C27B0'}">${initials(c.full_name)}</div>
          <div>

// ── DATA HELPERS ─────────────────────────────────────────────
function buildWeeklySummary(child, stats, journey, practiceToday) {
  const name = child.full_name.split(' ')[0];
  const streak = child.streak_days || 0;
  const xp = stats.weeklyXP || 0;
  const puzzles = stats.puzzlesSolved || 0;
  let msg = `${name} `;
  if (practiceToday) msg += 'has already practised today — great consistency! ';
  else msg += 'has not yet practised today — a gentle nudge would help. ';
  msg += `${streak > 0 ? `${streak}-day login streak is going strong. ` : 'The streak was broken recently — encourage a daily habit. '}`;
  msg += `${xp > 0 ? `Earned ${xp} XP this week. ` : ''}`;
  msg += `${puzzles > 0 ? `Solved ${puzzles} puzzle${puzzles>1?'s':''} — that means getting 5 correct in a row ${puzzles} time${puzzles>1?'s':''}!` : ''}`;
  return msg;
}

function buildConvStarters(child, stats, group) {
  const name = child.full_name.split(' ')[0];
  const streak = child.streak_days || 0;
  const bases = {
    tiny: [
      `💬 "Can you show me the puzzle you solved today, ${name}?"`,
      `💬 "How many stickers are in your sticker book now?"`,
      `💬 "What does Jumbo say when you get an answer right?"`,
    ],
    rising: [
      `💬 "How many XP points have you got now, ${name}?"`,
      `💬 "Can you show me the Big Friends rule on the abacus?"`,
      `💬 "${streak > 0 ? `Your streak is at ${streak} days — can you keep it going tomorrow?` : 'Try to login tomorrow to start a new streak!'}"`,
    ],
    champions: [
      `💬 "What rank are you on the batch leaderboard this week?"`,
      `💬 "How fast did you solve the Sudoku today?"`,
      `💬 "What title have you earned — are you a Maths Wizard yet?"`,
    ],
  };
  return (bases[group] || bases.rising).slice(0, 3);
}

function buildActionTips(child, stats, journey, group) {
  const name = child.full_name.split(' ')[0];
  const streak = child.streak_days || 0;
  const tips = [
    {
      icon: '📅',
      title: `Remind ${name} to login${streak > 0 ? ' today' : ' and restart the streak'}`,
      desc: streak > 0
        ? `${name} is on a ${streak}-day streak. Just ask "Did you do your maths today?" — frame it as "your badge is waiting!" not a chore.`
        : `The streak was broken recently. Help ${name} restart — even 5 minutes of practice counts and gets the streak going again.`,
    },
    {
      icon: group === 'tiny' ? '🐘' : '🧩',
      title: `Ask to see the ${group==='tiny'?'maze puzzle':'Sudoku'} ${name} solved`,
      desc: `Let ${name} explain it to you. Teaching reinforces learning and kids feel proud when parents show genuine interest. Ask "How did you solve it?"`,
    },
    {
      icon: '🎯',
      title: `Celebrate the streak tonight`,
      desc: `If ${name} has a streak going, mention it at dinner — "I saw you have a ${streak}-day streak, that is amazing!" It costs nothing and means everything.`,
    },
    {
      icon: '🧮',
      title: `Quick maths game in the car or at dinner`,
      desc: group === 'tiny'
        ? `Ask "${name}, what is 3 + 4?" Use simple numbers from Level ${child.current_level}. Make it fun — not a test. Clap and celebrate every right answer!`
        : `Ask "${name}, what is 47 + 28 — can you do it in your head?" Level ${child.current_level} students can handle this. Let them take their time.`,
    },
  ];
  return tips;
}

function buildMilestones(child, stats, journey, streak, badges) {
  const earnedKeys = new Set(badges.map(b=>b.badge_type||b.key));
  const ms = [];
  if (streak < 5 && !earnedKeys.has('streak_5')) ms.push({ icon:'🔥', text:`5-day streak badge — ${Math.max(0,5-streak)} more day${5-streak!==1?'s':''} to go`, when:`${5-streak}d` });
  else if (streak < 7 && !earnedKeys.has('streak_7')) ms.push({ icon:'🥇', text:`7-day legend badge — ${7-streak} more day${7-streak!==1?'s':''} to go`, when:`${7-streak}d` });
  if (!earnedKeys.has('puzzle_pro')) ms.push({ icon:'🧩', text:`Puzzle pro badge — solve ${Math.max(0,5-(stats.puzzlesSolved||0))} more puzzles`, when:'~1 week' });
  ms.push({ icon:'🎓', text:`Level ${(child.current_level||1)+1} unlocks after Week 12!`, when:`~${12-journey.week}w` });
  return ms.slice(0,4);
}

// ── LOAD CHILD STATS ─────────────────────────────────────────
async function loadChildStats(childId) {
  const stats = { badges:[], weeklyXP:0, practiceToday:false, puzzlesSolved:0, homeworkPending:0 };
  try {
    // Badges
    const { data: badges } = await sb.from('badges').select('*').eq('student_id', childId).order('earned_at',{ascending:false});
    stats.badges = badges || [];

    // Weekly XP from practice sessions
    const weekStart = new Date(); weekStart.setDate(weekStart.getDate()-weekStart.getDay()); weekStart.setHours(0,0,0,0);
    const { data: ws } = await sb.from('practice_sessions').select('xp_earned').eq('student_id', childId).gte('created_at', weekStart.toISOString());
    stats.weeklyXP = (ws||[]).reduce((s,r)=>s+(r.xp_earned||0),0);

    // Practice today
    const todayStart = new Date(); todayStart.setHours(0,0,0,0);
    const { data: ts } = await sb.from('practice_sessions').select('id').eq('student_id', childId).gte('created_at', todayStart.toISOString()).limit(1);
    stats.practiceToday = (ts?.length||0)>0;

    // Puzzles solved
    const { data: ps } = await sb.from('practice_sessions').select('id').eq('student_id', childId).eq('session_type','puzzle');
    stats.puzzlesSolved = ps?.length || 0;

    // Homework pending = lx_worksheets not yet submitted
    const { data: batches } = await sb.from('batch_students').select('batch_id').eq('student_id', childId);
    if(batches?.length) {
      const { data: wsResp } = await sb.from('worksheet_responses').select('worksheet_id').eq('student_id', childId);
      const doneIds = new Set((wsResp||[]).map(r=>r.worksheet_id));
      const batchIds = batches.map(b=>b.batch_id);
      const { data: allWs } = await sb.from('lx_worksheets').select('id').eq('is_active',true)
        .or('student_id.eq.'+childId+',batch_id.in.('+batchIds.join(',')+')');
      stats.homeworkPending = (allWs||[]).filter(w=>!doneIds.has(w.id)).length;
    }
  } catch(e) { console.error('loadChildStats error:', e); }

  // Load teacher parent notes from worksheets
  try {
    const { data: batchLinks } = await sb.from('batch_students').select('batch_id').eq('student_id', childId);
    const batchIds = (batchLinks||[]).map(b => b.batch_id);
    if (batchIds.length) {
      const oneWeekAgo = new Date(); oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
      const { data: notes } = await sb.from('lx_worksheets')
        .select('title, parent_note, created_at')
        .or(`student_id.eq.${childId},batch_id.in.(${batchIds.join(',')})`)
        .not('parent_note', 'is', null)
        .gte('created_at', oneWeekAgo.toISOString())
        .order('created_at', { ascending: false })
        .limit(3);
      stats.parentNotes = (notes||[]).filter(n => n.parent_note?.trim());
    }
  } catch(e) {}

  return stats;
}

    if (!children.length) {
      document.getElementById('mainContent').innerHTML = `
        <div style="text-align:center;padding:40px 20px;color:var(--text3);">
          <div style="font-size:3rem;margin-bottom:12px;">👶</div>
          <div style="font-size:1rem;font-weight:800;color:var(--text);margin-bottom:6px;">No children linked yet</div>
          <div style="font-size:.875rem;">Ask the academy admin to link your child to your account.</div>
        </div>`;
      return;
    }

    activeChild = children[0];
    const stats = await loadChildStats(activeChild.id);
    renderDashboard(activeChild, stats);

  } catch(err) {
    document.getElementById('mainContent').innerHTML = `<div style="padding:40px;text-align:center;color:var(--red);">Error: ${err.message} <a href="../../login.html">Login again</a></div>`;
  }
}

init();
</script>
</body>
</html>
