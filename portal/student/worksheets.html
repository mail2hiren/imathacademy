<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Worksheets — iMathAcademy</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'Nunito',sans-serif;background:#F7F8FF;color:#1A1A2E;min-height:100vh;}
    :root{
      --green:#43A047;--green-dk:#1B5E20;--green-lt:#E8F5E9;
      --blue:#1E88E5;--blue-dk:#0D47A1;--blue-lt:#E3F2FD;
      --orange:#FB8C00;--orange-dk:#E65100;--orange-lt:#FFF3E0;
      --purple:#8E24AA;--purple-lt:#F3E5F5;--purple-dk:#4A148C;
      --red:#E53935;--red-lt:#FFEBEE;
      --yellow:#F9A825;--yellow-lt:#FFFDE7;
      --bg:#fff;--bg2:#F7F8FF;--border:#E8EAF6;
      --text:#1A1A2E;--text2:#4A4A6A;--text3:#9090B0;
    }

    /* ── TOPBAR ── */
    .topbar{height:56px;background:var(--bg);border-bottom:2px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.04);}
    .topbar-logo{display:flex;align-items:center;flex-shrink:0;text-decoration:none;}
    .topbar-logo img{height:32px;width:auto;object-fit:contain;}
    .topbar-title{font-family:'Baloo 2',sans-serif;font-size:1rem;font-weight:800;flex:1;}
    .topbar-badge{font-size:.7rem;font-weight:800;background:var(--blue-lt);color:var(--blue-dk);padding:3px 10px;border-radius:20px;border:1.5px solid var(--blue);}

    /* ── CONTENT ── */
    .content{padding:14px;max-width:680px;margin:0 auto;padding-bottom:80px;}

    /* ── CARDS ── */
    .ws-card{background:var(--bg);border:2px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden;transition:box-shadow .12s;}
    .ws-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);}
    .ws-card-header{padding:14px 16px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;}
    .ws-card-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
    .ws-card-info{flex:1;}
    .ws-card-title{font-size:.9rem;font-weight:800;margin-bottom:3px;}
    .ws-card-meta{font-size:.72rem;color:var(--text3);display:flex;gap:10px;flex-wrap:wrap;}
    .ws-card-status{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0;}
    .ws-status-pill{font-size:.65rem;font-weight:800;padding:3px 10px;border-radius:20px;white-space:nowrap;}
    .pill-new{background:var(--blue-lt);color:var(--blue-dk);border:1.5px solid var(--blue);}
    .pill-done{background:var(--green-lt);color:var(--green-dk);border:1.5px solid var(--green);}
    .pill-inprogress{background:var(--yellow-lt);color:#E65100;border:1.5px solid var(--yellow);}

    /* ── EXPAND BODY ── */
    .ws-body{display:none;border-top:2px solid var(--border);padding:16px;}
    .ws-body.open{display:block;}

    /* ── QUESTION BLOCK ── */
    .q-block{padding:12px 14px;border:2px solid var(--border);border-radius:12px;margin-bottom:10px;background:var(--bg2);}
    .q-num{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:6px;}
    .q-text{font-size:1rem;font-weight:700;margin-bottom:10px;line-height:1.5;}
    .q-input{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:10px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;color:var(--text);background:var(--bg);outline:none;transition:border-color .12s;}
    .q-input:focus{border-color:var(--blue);}
    .q-input.correct{border-color:var(--green);background:var(--green-lt);color:var(--green-dk);}
    .q-input.wrong{border-color:var(--red);background:var(--red-lt);color:var(--red);}
    .q-feedback{font-size:.78rem;font-weight:700;margin-top:5px;display:none;}
    .q-feedback.show{display:block;}
    .q-feedback.correct{color:var(--green-dk);}
    .q-feedback.wrong{color:var(--red);}

    /* ── HINT BOX ── */
    .hint-box{background:var(--yellow-lt);border:1.5px solid var(--yellow);border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:.82rem;color:var(--orange-dk);}
    .hint-title{font-weight:800;margin-bottom:4px;}

    /* ── SUBMIT ── */
    .submit-row{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;}
    .submit-btn{flex:1;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:800;cursor:pointer;touch-action:manipulation;min-height:44px;}
    .submit-btn:disabled{opacity:.6;cursor:not-allowed;}
    .hint-btn{padding:12px 16px;background:var(--bg2);border:2px solid var(--border);border-radius:12px;font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;touch-action:manipulation;}

    /* ── RESULTS ── */
    .result-banner{border-radius:14px;padding:16px;text-align:center;margin-bottom:12px;}
    .result-score{font-size:2rem;font-weight:900;margin-bottom:4px;}
    .result-msg{font-size:.875rem;font-weight:700;}

    /* ── LOADER ── */
    .loader{text-align:center;padding:60px 20px;color:var(--text3);}
    .spinner{width:32px;height:32px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── EMPTY ── */
    .empty{text-align:center;padding:60px 20px;color:var(--text3);}
    .empty-icon{font-size:3rem;margin-bottom:10px;}
    .empty-text{font-size:.875rem;line-height:1.6;}

    /* ── BOTTOM NAV ── */
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--bg);border-top:2px solid var(--border);z-index:200;}
    .bottom-nav-inner{display:flex;height:100%;}
    .bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;border:none;background:none;padding:4px 0;min-height:44px;}
    .bnav-icon{font-size:1.3rem;}
    .bnav-label{font-size:.62rem;font-weight:700;color:var(--text3);font-family:inherit;}
    .bnav-item.active .bnav-label{color:var(--blue-dk);}
    @media(max-width:768px){.bottom-nav{display:block;}body{padding-bottom:64px;}}

    /* ── TABS ── */
    .tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
    .tabs::-webkit-scrollbar{display:none;}
    .tab-btn{padding:7px 16px;border-radius:20px;border:2px solid var(--border);background:var(--bg);font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Nunito',sans-serif;transition:all .12s;}
    .tab-btn.active{background:var(--blue-lt);border-color:var(--blue);color:var(--blue-dk);}

    /* ── SECTION TITLE ── */
    .sec-title{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:10px;}
  </style>
</head>
<body>

<div class="topbar">
  <a class="topbar-logo" href="dashboard.html"><img src="../../assets/logo.png" alt="iMathAcademy"></a>
  <div class="topbar-title">My Worksheets</div>
  <div class="topbar-badge" id="pendingBadge" style="display:none;">0 new</div>
</div>

<div class="content">

  <div class="tabs">
    <button class="tab-btn active" onclick="filterWs('all',this)">All</button>
    <button class="tab-btn" onclick="filterWs('new',this)">🆕 New</button>

  <div id="wsList">
    <div class="loader"><div class="spinner"></div>Loading your worksheets...</div>
  </div>

</div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a class="bnav-item" href="dashboard.html"><span class="bnav-icon">🏠</span><span class="bnav-label">Home</span></a>
    <a class="bnav-item" href="practice.html"><span class="bnav-icon">⚡</span><span class="bnav-label">Practice</span></a>
    <a class="bnav-item" href="lessons.html"><span class="bnav-icon">▶️</span><span class="bnav-label">Lessons</span></a>

</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://bhullfoajenhkxlkiubs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJodWxsZm9hamVuaGt4bGtpdWJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MzcwMjUsImV4cCI6MjA5MzExMzAyNX0.RUcKFGluRhu9H8sZdLb-ow4ORoCd2-oIzYXJqyNZ5Uc';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null, allWorksheets = [], responses = {}, currentFilter = 'all';

// ── SUBSCRIPTION CHECK ────────────────────────────────────
async function checkSubscription(userId) {
  const { data } = await sb.from('subscriptions').select('expires_at').eq('student_id', userId).eq('status','active').order('expires_at',{ascending:false}).limit(1);
  if (!data?.length || new Date(data[0].expires_at) < new Date()) { window.location.href='subscription.html'; return false; }
  return true;
}

// ── HELPERS ──────────────────────────────────────────────
function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—'; }

function parseQuestions(text) {
  // Parse numbered questions from AI-generated text
  const lines = text.split('\n');
  const questions = [];
  let current = null;
  for (const line of lines) {
    const stripped = line.trim();
    if (!stripped) continue;
    // Match: 1. or 1) or Q1.
    const match = stripped.match(/^(?:Q?(\d+)[.)]\s+)(.+)/);
    if (match) {
      if (current) questions.push(current);
      let qtext = match[2];
      // Extract blank markers — ___ or ___
      const hasBlank = qtext.includes('___') || qtext.includes('= ?') || qtext.includes('=?');
      current = { num: parseInt(match[1]), text: qtext, hasBlank, answer: null };
    } else if (current && stripped.startsWith('Answer:')) {
      current.answer = stripped.replace('Answer:','').trim();
    }
  }
  if (current) questions.push(current);
  return questions;
}

function getHintText(ws) {
  // Return hint/formula box content if it exists
  const content = ws.content || '';
  const hintMatch = content.match(/##\s*HINT BOX\s*([\s\S]*?)(?=##|$)/i);
  return hintMatch ? hintMatch[1].trim() : null;
}

function getWorksheetQuestions(ws) {
  const content = ws.content || '';
  // Extract just the worksheet section
  const wsMatch = content.match(/##\s*WORKSHEET\s*([\s\S]*?)(?=##|$)/i);
  const wsText = wsMatch ? wsMatch[1].trim() : content;
  return parseQuestions(wsText);
}

// ── FILTER ───────────────────────────────────────────────
function filterWs(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn?.classList.add('active');
  renderList();
}

// ── RENDER LIST ──────────────────────────────────────────
function renderList() {
  const list = document.getElementById('wsList');
  let filtered = allWorksheets;
  if (currentFilter !== 'all') filtered = allWorksheets.filter(w => getStatus(w) === currentFilter);

  if (!filtered.length) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">${currentFilter==='new'?'🆕':currentFilter==='done'?'✅':'📋'}</div>
      <div class="empty-text">${
        currentFilter==='new' ? 'No new worksheets. Your teacher will assign some soon!' :
        currentFilter==='done' ? 'No completed worksheets yet. Solve one!' :
        'No worksheets assigned yet. Your teacher will create some using the LX Designer!'
      }</div>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(ws => renderCard(ws)).join('');
}

function getStatus(ws) {
  const r = responses[ws.id];
  if (!r) return 'new';
  if (r.submitted) return 'done';
  return 'inprogress';
}

function getStatusPill(ws) {
  const s = getStatus(ws);
  if (s === 'done') return '<span class="ws-status-pill pill-done">✅ Done</span>';
  if (s === 'inprogress') return '<span class="ws-status-pill pill-inprogress">✏️ In progress</span>';
  return '<span class="ws-status-pill pill-new">🆕 New</span>';
}

function getCardIcon(ws) {
  const level = ws.level || 1;
  const colors = ['#E3F2FD','#E8F5E9','#FFF3E0','#F3E5F5','#E8F5E9','#FFF3E0','#E3F2FD','#FCE4EC','#EDE7F6'];
  const bg = colors[level] || '#F7F8FF';
  return `<div class="ws-card-icon" style="background:${bg};">📋</div>`;
}

function renderCard(ws) {
  const qs = getWorksheetQuestions(ws);
  const hint = getHintText(ws);
  const status = getStatus(ws);
  const r = responses[ws.id] || {};

  return `
  <div class="ws-card" id="card-${ws.id}">
    <div class="ws-card-header" onclick="toggleCard('${ws.id}')">
      ${getCardIcon(ws)}
      <div class="ws-card-info">
        <div class="ws-card-title">${ws.title}</div>
        <div class="ws-card-meta">
          <span>Level ${ws.level || '—'}</span>
          <span>·</span>
          <span>${qs.length} questions</span>
          <span>·</span>
          <span>Assigned ${fmtDate(ws.created_at)}</span>
        </div>
      </div>
      <div class="ws-card-status">
        ${getStatusPill(ws)}
        <span style="color:var(--text3);font-size:.9rem;margin-left:4px;" id="chevron-${ws.id}">▼</span>
      </div>
    </div>

    <div class="ws-body" id="body-${ws.id}">

      ${hint ? `<div class="hint-box" id="hint-${ws.id}" style="display:none;">
        <div class="hint-title">💡 Formula reminder</div>
        <div style="font-size:.8rem;line-height:1.7;white-space:pre-wrap;">${hint}</div>
      </div>` : ''}

      ${qs.length === 0 ? `
        <div style="padding:20px;text-align:center;color:var(--text3);">
          <div style="font-size:2rem;margin-bottom:8px;">📄</div>
          <div style="font-size:.875rem;">This worksheet is available as reading material.</div>
          <div style="font-size:.82rem;margin-top:12px;background:var(--bg2);border-radius:10px;padding:12px;text-align:left;white-space:pre-wrap;line-height:1.7;color:var(--text2);">${(ws.content||'').replace(/##[^\n]*/g,'').trim().slice(0,600)}</div>
        </div>
      ` : `
        <div id="questions-${ws.id}">
          ${qs.map((q,i) => `
          <div class="q-block" id="qblock-${ws.id}-${i}">
            <div class="q-num">Question ${q.num || i+1}</div>
            <div class="q-text">${q.text.replace(/___+/g,'<span style="display:inline-block;border-bottom:2px solid #999;width:60px;margin:0 4px;"></span>').replace(/=/g,' = ')}</div>
            <input class="q-input" id="ans-${ws.id}-${i}" type="text" inputmode="numeric" placeholder="Your answer..."
              ${status==='done' ? 'disabled' : ''}
              ${r.answers?.[i] ? `value="${r.answers[i]}"` : ''}
              onkeydown="if(event.key==='Enter'){document.getElementById('ans-${ws.id}-${i+1}')?.focus()}"
              oninput="saveProgress('${ws.id}',${i},this.value)">
            <div class="q-feedback ${status==='done'&&r.answers?.[i]?'show':''} ${status==='done'?(r.correct?.[i]?'correct':'wrong'):''}" id="fb-${ws.id}-${i}">
              ${status==='done' ? (r.correct?.[i] ? '✅ Correct!' : `❌ Answer: ${q.answer || '—'}`) : ''}
            </div>
          </div>`).join('')}
        </div>

        ${status !== 'done' ? `
        <div class="submit-row">
          ${hint ? `<button class="hint-btn" onclick="toggleHint('${ws.id}')">💡 Show hint</button>` : ''}
          <button class="submit-btn" onclick="submitWorksheet('${ws.id}')" id="submit-${ws.id}">
            Submit answers
          </button>
        </div>` : `
        <div class="result-banner" style="background:${r.pct>=80?'var(--green-lt)':r.pct>=50?'var(--yellow-lt)':'var(--red-lt)'};border:2px solid ${r.pct>=80?'var(--green)':r.pct>=50?'var(--yellow)':'var(--red)'};">
          <div class="result-score" style="color:${r.pct>=80?'var(--green-dk)':r.pct>=50?'var(--orange-dk)':'var(--red)'};">${r.score}/${qs.length}</div>
          <div class="result-msg" style="color:${r.pct>=80?'var(--green-dk)':r.pct>=50?'var(--orange-dk)':'var(--red)'};">${r.pct>=80?'Excellent work! 🎉':r.pct>=50?'Good effort! Keep practising 💪':'Keep trying — you can do it! 🌟'}</div>
        </div>`}
      `}

    </div>
  </div>`;
}

// ── TOGGLE CARD ──────────────────────────────────────────
function toggleCard(id) {
  const body = document.getElementById('body-' + id);
  const chevron = document.getElementById('chevron-' + id);
  const isOpen = body.classList.contains('open');
  // Close all
  document.querySelectorAll('.ws-body').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('[id^="chevron-"]').forEach(c => c.textContent = '▼');
  if (!isOpen) {
    body.classList.add('open');
    chevron.textContent = '▲';
    // Focus first input
    setTimeout(() => { document.querySelector(`#body-${id} .q-input`)?.focus(); }, 100);
  }
}

// ── TOGGLE HINT ──────────────────────────────────────────
function toggleHint(wsId) {
  const hint = document.getElementById('hint-' + wsId);
  if (!hint) return;
  hint.style.display = hint.style.display === 'none' ? 'block' : 'none';
}

// ── SAVE PROGRESS (in memory + localStorage) ─────────────
function saveProgress(wsId, qIdx, value) {
  if (!responses[wsId]) responses[wsId] = { answers: {}, submitted: false };
  responses[wsId].answers[qIdx] = value;
  // Persist locally so they don't lose work on refresh
  try { localStorage.setItem('ws_progress_' + wsId, JSON.stringify(responses[wsId])); } catch(e){}
}

// ── SUBMIT ───────────────────────────────────────────────
async function submitWorksheet(wsId) {
  const ws = allWorksheets.find(w => w.id === wsId);
  if (!ws) return;
  const qs = getWorksheetQuestions(ws);
  if (!qs.length) return;

  const btn = document.getElementById('submit-' + wsId);
  btn.disabled = true;
  btn.textContent = 'Checking...';

  const answers = {};
  const correct = {};
  let score = 0;

  qs.forEach((q, i) => {
    const input = document.getElementById(`ans-${wsId}-${i}`);
    const val = (input?.value || '').trim();
    answers[i] = val;

    // Check answer — compare numbers if possible
    if (q.answer) {
      const expected = q.answer.toString().trim().replace(/[,\s]/g,'');
      const given    = val.replace(/[,\s]/g,'');
      correct[i] = (given === expected) || (parseFloat(given) === parseFloat(expected));
      if (correct[i]) score++;
    }
  });

  const pct = Math.round(score / qs.length * 100);
  const xp  = Math.round(pct / 100 * 20) + 5; // 5–25 XP for completing

  // Save to DB
  try {
    const { data: { session } } = await sb.auth.getSession();

    await sb.from('worksheet_responses').insert({
      worksheet_id: wsId,
      student_id:   currentUser.id,
      answers:      JSON.stringify(answers),
      score,
      total:        qs.length,
      xp_earned:    xp,
      submitted_at: new Date().toISOString(),
    });

    // Award XP in practice_sessions
    await sb.from('practice_sessions').insert({
      student_id:      currentUser.id,
      correct_answers: score,
      total_questions: qs.length,
      xp_earned:       xp,
      session_type:    'worksheet',
    });

    // Update user XP
    await sb.from('users').update({ xp_points: (currentUser.xp_points || 0) + xp }).eq('id', currentUser.id);
    currentUser.xp_points = (currentUser.xp_points || 0) + xp;

  } catch(e) {
    console.error('Submit error:', e);
    // Even if save fails, show result locally
  }

  // Store locally
  responses[wsId] = { answers, correct, score, pct, submitted: true };
  try { localStorage.removeItem('ws_progress_' + wsId); } catch(e){}

  // Re-render this card
  const card = document.getElementById('card-' + wsId);
  if (card) {
    const newCard = document.createElement('div');
    newCard.innerHTML = renderCard(ws);
    card.replaceWith(newCard.firstElementChild);
    // Re-open the card to show result
    toggleCard(wsId);
  }
}

// ── LOAD ─────────────────────────────────────────────────
async function init() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = '../../login.html'; return; }

    const { data: profile } = await sb.from('users').select('*').eq('id', session.user.id).single();
    if (!profile || profile.role !== 'student') { window.location.href = '../../login.html'; return; }
    currentUser = { ...profile, id: session.user.id };

    const active = await checkSubscription(session.user.id);
    if (!active) return;

    // Load worksheets assigned to this student or their batch
    const { data: batchLinks } = await sb.from('batch_students').select('batch_id').eq('student_id', session.user.id);
    const batchIds = (batchLinks || []).map(b => b.batch_id);

    // Build query — worksheets for this student directly OR for their batches
    let wsQuery = sb.from('lx_worksheets').select('*').eq('is_active', true).order('created_at', { ascending: false });

    // We need worksheets where student_id = me OR batch_id IN my batches
    if (batchIds.length) {
      wsQuery = sb.from('lx_worksheets').select('*').eq('is_active', true)
        .or(`student_id.eq.${session.user.id},batch_id.in.(${batchIds.join(',')})`)
        .order('created_at', { ascending: false });
    } else {
      wsQuery = sb.from('lx_worksheets').select('*').eq('is_active', true)
        .eq('student_id', session.user.id)
        .order('created_at', { ascending: false });
    }

    const { data: worksheets, error } = await wsQuery;
    if (error) throw error;

    allWorksheets = worksheets || [];

    // Load existing responses
    let responseQuery = sb.from('worksheet_responses').select('worksheet_id,score,total,submitted_at').eq('student_id', session.user.id);
    const { data: existingResponses } = await responseQuery;
    (existingResponses || []).forEach(r => {
      responses[r.worksheet_id] = {
        submitted: true,
        score: r.score,
        total: r.total,
        pct: Math.round(r.score / r.total * 100),
      };
    });

    // Also restore any in-progress from localStorage
    allWorksheets.forEach(ws => {
      if (!responses[ws.id]) {
        try {
          const saved = localStorage.getItem('ws_progress_' + ws.id);
          if (saved) responses[ws.id] = JSON.parse(saved);
        } catch(e){}
      }
    });

    // Update pending badge
    const newCount = allWorksheets.filter(w => getStatus(w) === 'new').length;
    const badge = document.getElementById('pendingBadge');
    if (newCount > 0) { badge.textContent = newCount + ' new'; badge.style.display = 'block'; }

    renderList();

  } catch(err) {
    document.getElementById('wsList').innerHTML = `<div style="padding:40px;text-align:center;color:var(--red);">Error: ${err.message}</div>`;
  }
}

init();
</script>
</body>
</html>
