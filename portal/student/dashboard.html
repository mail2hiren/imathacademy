<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <title>Dashboard — iMathAcademy</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Nunito', sans-serif; background: #F7F8FF; color: #1A1A2E; min-height: 100vh; overflow-x: hidden; }
    :root {
      --green: #43A047; --green-dk: #1B5E20; --green-lt: #E8F5E9;
      --blue: #1E88E5; --blue-dk: #0D47A1; --blue-lt: #E3F2FD;
      --orange: #FB8C00; --orange-dk: #E65100; --orange-lt: #FFF3E0;
      --purple: #8E24AA; --purple-lt: #F3E5F5; --purple-dk: #4A148C;
      --red: #E53935; --red-lt: #FFEBEE; --red-dk: #B71C1C;
      --yellow: #F9A825; --yellow-lt: #FFFDE7; --yellow-dk: #F57F17;
      --pink: #E91E8C; --pink-lt: #FCE4EC; --pink-dk: #880E4F;
      --bg: #fff; --bg2: #F7F8FF; --border: #E8EAF6;
      --text: #1A1A2E; --text2: #4A4A6A; --text3: #9090B0;
      --bottom-nav-h: 64px;
    }

    /* ── LAYOUT ── */
    .portal { display: flex; min-height: 100vh; }

    /* Desktop sidebar */
    .sidebar { width: 220px; flex-shrink: 0; background: var(--bg); border-right: 2px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100; }
    .logo { padding: 18px 16px; border-bottom: 2px solid var(--border); font-family: 'Baloo 2', sans-serif; font-size: 1.1rem; font-weight: 800; color: var(--green-dk); display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 34px; height: 34px; background: var(--green); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
    .logo span { color: var(--orange-dk); }
    nav { flex: 1; padding: 10px 0; }
    .nav-sec { font-size: .65rem; font-weight: 800; text-transform: uppercase; letter-spacing: .8px; color: var(--text3); padding: 8px 16px 2px; margin-top: 4px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; font-size: .875rem; font-weight: 700; color: var(--text2); cursor: pointer; border-left: 3px solid transparent; transition: all .12s; text-decoration: none; }
    .nav-item:hover { background: var(--bg2); }
    .nav-item.active { color: var(--blue-dk); background: var(--blue-lt); border-left-color: var(--blue); }
    .nav-icon { width: 22px; text-align: center; font-size: 1.1rem; }
    .sidebar-user { padding: 12px 16px; border-top: 2px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .av { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .8rem; font-weight: 800; flex-shrink: 0; }
    .av-g { background: var(--green-lt); color: var(--green-dk); border: 2px solid var(--green); }
    .user-name { font-size: .82rem; font-weight: 800; }
    .user-role { font-size: .7rem; color: var(--text3); font-weight: 600; }
    .logout-btn { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--text3); font-size: .9rem; padding: 4px 8px; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }

    /* Main content */
    .main { flex: 1; margin-left: 220px; padding-bottom: 0; }
    .topbar { height: 56px; background: var(--bg); border-bottom: 2px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
    .topbar-title { font-family: 'Baloo 2', sans-serif; font-size: 1rem; font-weight: 800; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .notif-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; position: relative; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
    .notif-dot { position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; background: var(--red); border-radius: 50%; border: 2px solid var(--bg); }
    .content { padding: 16px; }

    /* ── BOTTOM NAV (mobile only) ── */
    .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottom-nav-h); background: var(--bg); border-top: 2px solid var(--border); z-index: 200; box-shadow: 0 -4px 16px rgba(0,0,0,.08); }
    .bottom-nav-inner { display: flex; height: 100%; }
    .bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; text-decoration: none; border: none; background: none; padding: 4px 0; min-height: 44px; min-width: 44px; transition: all .12s; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .bnav-icon { font-size: 1.3rem; line-height: 1; }
    .bnav-label { font-size: .62rem; font-weight: 700; color: var(--text3); font-family: 'Nunito', sans-serif; }
    .bnav-item.active .bnav-label { color: var(--blue-dk); }
    .bnav-item.active .bnav-icon { transform: scale(1.15); }
    .bnav-badge { position: absolute; top: -2px; right: -4px; background: var(--red); color: #fff; font-size: .55rem; font-weight: 800; width: 14px; height: 14px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .bnav-icon-wrap { position: relative; display: inline-flex; }

    /* ── HERO CARD ── */
    .hero { background: linear-gradient(135deg, #1565C0, #6A1B9A); border-radius: 20px; padding: 20px; margin-bottom: 14px; color: #fff; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; top: -30px; right: -30px; width: 140px; height: 140px; border-radius: 50%; background: rgba(255,255,255,.06); }
    .hero::after  { content: ''; position: absolute; bottom: -40px; right: 60px; width: 90px; height: 90px; border-radius: 50%; background: rgba(255,255,255,.04); }
    .hero-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; gap: 10px; }
    .hero-greeting { font-size: .82rem; opacity: .75; margin-bottom: 3px; }
    .hero-name { font-size: 1.2rem; font-weight: 800; margin-bottom: 3px; }
    .hero-sub { font-size: .75rem; opacity: .7; }
    .streak-box { background: rgba(255,255,255,.15); border-radius: 12px; padding: 8px 12px; text-align: center; border: 1px solid rgba(255,255,255,.2); flex-shrink: 0; }
    .streak-icon { font-size: 1.3rem; }
    .streak-num { font-size: 1.1rem; font-weight: 800; line-height: 1.1; }
    .streak-label { font-size: .65rem; opacity: .8; }
    /* XP bar */
    .xp-wrap { }
    .xp-labels { display: flex; justify-content: space-between; font-size: .72rem; opacity: .8; margin-bottom: 5px; }
    .xp-bar { height: 10px; background: rgba(255,255,255,.2); border-radius: 20px; overflow: hidden; }
    .xp-fill { height: 100%; background: linear-gradient(90deg, #FFD600, #FF6F00); border-radius: 20px; transition: width .5s ease; }
    .xp-hint { font-size: .7rem; opacity: .7; margin-top: 4px; text-align: right; }

    /* ── DAILY MISSION ── */
    .section-title { font-size: .72rem; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; color: var(--text3); margin-bottom: 10px; }
    .mission-card { background: var(--bg); border: 2px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 14px; }
    .mission-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .mission-title { font-size: .95rem; font-weight: 800; }
    .mission-timer { font-size: .72rem; color: var(--text3); font-weight: 600; }
    .mission-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); touch-action: manipulation; }
    .mission-item:last-child { border-bottom: none; }
    .mission-icon { font-size: 1.2rem; width: 28px; text-align: center; flex-shrink: 0; }
    .mission-info { flex: 1; }
    .mission-name { font-size: .875rem; font-weight: 700; }
    .mission-desc { font-size: .75rem; color: var(--text2); margin-top: 2px; }
    .mission-xp { font-size: .82rem; font-weight: 800; color: var(--orange-dk); white-space: nowrap; }
    .mission-done { color: var(--green-dk); }

    /* ── ACTION BUTTONS ── */
    .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .action-btn { border: none; border-radius: 16px; padding: 16px 14px; cursor: pointer; text-align: left; position: relative; overflow: hidden; min-height: 90px; min-width: 44px; display: flex; flex-direction: column; justify-content: flex-end; transition: transform .15s, box-shadow .15s; -webkit-user-select: none; -webkit-touch-callout: none; touch-action: manipulation; }
    .action-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.15); }
    .action-btn:active { transform: scale(.97); }
    .action-emoji { font-size: 1.8rem; margin-bottom: 6px; }
    .action-name { font-size: .875rem; font-weight: 800; color: #fff; }
    .action-sub  { font-size: .72rem; color: rgba(255,255,255,.8); margin-top: 2px; }
    .action-badge { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,.25); color: #fff; font-size: .65rem; font-weight: 800; padding: 2px 8px; border-radius: 20px; }
    .action-lock { position: absolute; top: 10px; right: 10px; font-size: 1rem; }

    /* ── PROGRESS ── */
    .progress-card { background: var(--bg); border: 2px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 14px; }
    .progress-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .progress-item:last-child { margin-bottom: 0; }
    .progress-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
    .progress-label { font-size: .82rem; font-weight: 700; flex: 1; }
    .progress-bar-wrap { flex: 2; height: 6px; background: var(--border); border-radius: 20px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 20px; transition: width .5s ease; }
    .progress-pct { font-size: .75rem; font-weight: 800; width: 32px; text-align: right; }

    /* ── BADGES ── */
    .badges-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; -ms-overflow-style: none; }
    .badges-row::-webkit-scrollbar { display: none; }
    .badge-item { flex-shrink: 0; text-align: center; padding: 10px; border-radius: 12px; border: 2px solid var(--border); background: var(--bg); min-width: 70px; }
    .badge-item.earned { border-color: var(--yellow); background: var(--yellow-lt); }
    .badge-item.locked { opacity: .4; }
    .badge-emoji { font-size: 1.5rem; }
    .badge-name { font-size: .65rem; font-weight: 700; margin-top: 4px; color: var(--text2); }
    .badge-hint { background: var(--blue-lt); border: 1.5px solid var(--blue); border-radius: 10px; padding: 8px 12px; font-size: .78rem; color: var(--blue-dk); font-weight: 700; margin-bottom: 14px; }

    /* ── JR STICKER BOOK ── */
    .sticker-card { background: linear-gradient(135deg, #FFF9C4, #E8F5E9); border: 2px solid #4CAF50; border-radius: 16px; padding: 14px; margin-bottom: 14px; }
    .sticker-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .sticker-title { font-size: .95rem; font-weight: 800; color: var(--green-dk); }
    .sticker-count { font-size: .78rem; font-weight: 700; color: var(--green); }
    .stickers-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
    .sticker-em { font-size: 1.8rem; }
    .sticker-locked { font-size: 1.8rem; opacity: .2; }
    .sticker-hint { font-size: .78rem; color: var(--green-dk); font-weight: 600; }

    /* ── MASCOT ── */
    .mascot-card { background: linear-gradient(135deg, var(--pink-lt), var(--purple-lt)); border: 2px solid #CE93D8; border-radius: 16px; padding: 14px; display: flex; gap: 12px; align-items: flex-start; margin-bottom: 14px; }
    .mascot-em { font-size: 2.5rem; flex-shrink: 0; }
    .mascot-name { font-size: .78rem; font-weight: 800; color: var(--purple-dk); margin-bottom: 4px; }
    .mascot-msg { font-size: .82rem; color: var(--purple-dk); line-height: 1.6; font-style: italic; }

    /* ── SR LEADERBOARD ── */
    .lb-card { background: var(--bg); border: 2px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 14px; }
    .lb-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); min-height: 44px; }
    .lb-item:last-child { border-bottom: none; }
    .lb-rank { font-size: 1rem; width: 24px; text-align: center; flex-shrink: 0; }
    .lb-name { flex: 1; font-size: .875rem; font-weight: 700; }
    .lb-xp { font-size: .82rem; font-weight: 800; color: var(--orange-dk); }
    .lb-you { background: var(--blue-lt); border-radius: 8px; padding: 8px 10px; border: 1.5px solid var(--blue); }
    .lb-you .lb-name { color: var(--blue-dk); }
    .lb-hint { margin-top: 8px; font-size: .75rem; color: var(--blue-dk); font-weight: 700; background: var(--blue-lt); border-radius: 8px; padding: 6px 10px; }

    /* ── SR TITLE ── */
    .title-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--blue-dk); color: #fff; padding: 5px 14px; border-radius: 20px; font-size: .8rem; font-weight: 800; margin-bottom: 14px; }

    /* ── NOTIFICATIONS ── */
    .notif-panel { display: none; position: fixed; top: 56px; right: 0; width: min(360px, 100vw); background: var(--bg); border-left: 2px solid var(--border); border-bottom: 2px solid var(--border); border-radius: 0 0 0 16px; box-shadow: -4px 4px 20px rgba(0,0,0,.1); z-index: 300; max-height: calc(100vh - 56px); overflow-y: auto; }
    .notif-panel.open { display: block; }
    .notif-header { padding: 14px 16px; font-weight: 800; border-bottom: 1px solid var(--border); font-size: .95rem; }
    .notif-item { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .notif-item:last-child { border-bottom: none; }
    .notif-item-title { font-size: .82rem; font-weight: 700; margin-bottom: 2px; }
    .notif-item-sub   { font-size: .75rem; color: var(--text2); }
    .notif-empty { padding: 24px; text-align: center; color: var(--text3); font-size: .875rem; }

    /* ── TOAST ── */
    .toast-wrap { position: fixed; bottom: calc(var(--bottom-nav-h) + 16px); right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 6px; }
    .toast { padding: 10px 16px; border-radius: 12px; font-size: .82rem; font-weight: 700; box-shadow: 0 4px 16px rgba(0,0,0,.15); animation: slideUp .3s ease; color: #fff; }
    .toast-success { background: var(--green-dk); }
    .toast-error   { background: var(--red-dk); }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding-bottom: var(--bottom-nav-h); }
      .topbar { height: 52px; padding: 0 14px; }
      .content { padding: 12px; }
      .bottom-nav { display: block; }
      .notif-panel { width: 100vw; border-left: none; border-radius: 0; }

      /* Hero adjustments */
      .hero { border-radius: 16px; padding: 14px; }
      .hero-name { font-size: 1.05rem; }
      .hero-top { margin-bottom: 10px; }

      /* Action grid — 2 columns always, tighter */
      .actions-grid { gap: 8px; }
      .action-btn { min-height: 82px; padding: 12px 10px; border-radius: 14px; }
      .action-emoji { font-size: 1.5rem; margin-bottom: 4px; }
      .action-name { font-size: .82rem; }
      .action-sub { font-size: .68rem; }

      /* Cards */
      .mission-card { padding: 12px; border-radius: 14px; }
      .progress-card { padding: 12px; border-radius: 14px; }
      .lb-card { padding: 12px; border-radius: 14px; }

      /* Badges scroll horizontal nicely */
      .badges-row { gap: 6px; }
      .badge-item { min-width: 62px; padding: 8px 6px; }

      /* Stickers wrap nicely */
      .sticker-em { font-size: 1.5rem; }

      /* Mascot card */
      .mascot-card { padding: 12px; border-radius: 14px; }
      .mascot-em { font-size: 2rem; }

      /* Leaderboard */
      .lb-item { padding: 7px 0; }

      /* Section titles */
      .section-title { font-size: .68rem; margin-bottom: 8px; }

      /* XP bar labels smaller */
      .xp-labels { font-size: .68rem; }
      .xp-hint { font-size: .65rem; }

      /* Toast above bottom nav */
      .toast-wrap { bottom: calc(var(--bottom-nav-h) + 12px); right: 12px; }

      /* Notification panel full screen on mobile */
      .notif-panel { top: 52px; }
    }

    /* Very small phones — 320px */
    @media (max-width: 360px) {
      .actions-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
      .action-btn { min-height: 76px; padding: 10px 8px; }
      .action-name { font-size: .78rem; }
      .hero-name { font-size: 1rem; }
      .streak-num { font-size: 1rem; }
      .badge-item { min-width: 56px; }
    }

    @media (min-width: 769px) {
      .toast-wrap { bottom: 24px; }
    }

    /* Landscape phones */
    @media (max-width: 768px) and (orientation: landscape) {
      .bottom-nav { height: 52px; }
      :root { --bottom-nav-h: 52px; }
      .main { padding-bottom: 52px; }
      .bnav-icon { font-size: 1.1rem; }
      .bnav-label { display: none; }
      .hero { padding: 10px 14px; }
    }
  
    /* Level up ceremony */
    .levelup-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.6); z-index: 9998; display: flex; align-items: center; justify-content: center; }
    .levelup-card { background: #fff; border-radius: 24px; padding: 32px 24px; text-align: center; max-width: 320px; width: 90%; animation: levelUpPop .4s cubic-bezier(.34,1.56,.64,1); }
    @keyframes levelUpPop { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .levelup-emoji { font-size: 4rem; margin-bottom: 12px; }
    .levelup-title { font-family: 'Baloo 2', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--orange-dk); margin-bottom: 6px; }
    .levelup-sub { font-size: .875rem; color: var(--text2); line-height: 1.6; margin-bottom: 20px; }
    .levelup-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--orange), var(--purple)); color: #fff; border: none; border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800; cursor: pointer; }
    @keyframes confettiFall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
  </style>
</head>
<body>
<div class="portal">

  <!-- ── DESKTOP SIDEBAR ── -->
  <aside class="sidebar">
    <div class="logo"><img src="../../assets/logo.png" alt="iMathAcademy" style="height:32px;width:auto;object-fit:contain;"></div>
    <nav>
      <div class="nav-sec">Overview</div>
      <a class="nav-item active" href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <div class="nav-sec">Learning</div>
      <a class="nav-item" href="lessons.html"><span class="nav-icon">▶️</span> Lessons</a>
      <a class="nav-item" href="practice.html"><span class="nav-icon">⚡</span> Practice</a>
      <a class="nav-item" href="worksheets.html"><span class="nav-icon">📋</span> Worksheets</a>
      <a class="nav-item" href="weekly-quiz.html"><span class="nav-icon">⭐</span> Weekly Quiz</a>
      <div class="nav-sec">My stuff</div>
      <a class="nav-item" href="progress.html"><span class="nav-icon">📊</span> Progress</a>
      <a class="nav-item" href="homework.html"><span class="nav-icon">📚</span> Homework</a>
    </nav>
    <div class="sidebar-user">
      <div class="av av-g" id="desktopAv">S</div>
      <div><div class="user-name" id="desktopName">Student</div><div class="user-role" id="desktopGroup">—</div></div>
      <button class="logout-btn" onclick="logout()">⇥</button>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <div class="main">

    <!-- Top bar -->
    <div class="topbar">
      <a href="dashboard.html" style="display:flex;align-items:center;flex-shrink:0;text-decoration:none;"><img src="../../assets/logo.png" alt="iMathAcademy" style="height:36px;width:auto;object-fit:contain;"></a>
    <div class="topbar-title" id="topbarGreeting">Good morning! 👋</div>
      <div class="topbar-right">
        <button class="notif-btn" onclick="toggleNotif()" id="notifBtn">
          🔔
          <div class="notif-dot" id="notifDot" style="display:none"></div>
        </button>
        <button class="logout-btn" onclick="logout()" style="display:none" id="mobileLogout">⇥</button>
      </div>
    </div>

    <!-- Notification panel -->
    <div class="notif-panel" id="notifPanel">
      <div class="notif-header">🔔 Notifications</div>
      <div id="notifList"><div class="notif-empty">Loading...</div></div>
    </div>

    <!-- Content -->
    <div class="content" id="mainContent">
      <div style="text-align:center;padding:40px;color:var(--text3)">
        <div style="width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px"></div>
        Loading your dashboard...
      </div>
    </div>

  </div>

// ── HELPERS ─────────────────────────────────────────────────
function initials(name) { return (name||'S').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2); }
function greet() {

// ── AGE GROUP ────────────────────────────────────────────────
// Priority: 1) admin override (age_group field)
//           2) calculated from date_of_birth
//           3) fallback from current_level
function getGroup(profile) {
  // 1. Admin override takes highest priority
  if (profile.age_group) return profile.age_group;

  // 2. Calculate from date of birth
  if (profile.date_of_birth) {
    const dob  = new Date(profile.date_of_birth);
    const today = new Date();
    let age = today.getFullYear() - dob.getFullYear();
    const m = today.getMonth() - dob.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
    if (age <= 7)  return 'tiny';
    if (age <= 10) return 'rising';
    return 'champions';
  }

  // 3. Fallback: use current_level
  const level = profile.current_level || 1;
  if (level <= 1) return 'tiny';
  if (level <= 4) return 'rising';
  return 'champions';
}

function getAgeFromDOB(dob) {
  if (!dob) return null;
  const today = new Date();
  const birth = new Date(dob);
  let age = today.getFullYear() - birth.getFullYear();
  const m = today.getMonth() - birth.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
  return age;
}

function groupLabel(group) {
  return group === 'tiny' ? '🐣 Tiny Champs' : group === 'rising' ? '🌟 Rising Stars' : '🚀 Champions';
}

// ── BADGE DEFINITIONS ───────────────────────────────────────
const BADGE_DEFS = [
  { key: 'speed_star',    emoji: '⭐', name: 'Speed star'    },
  { key: 'perfect_score', emoji: '🎯', name: 'Perfect!'      },
  { key: 'streak_5',      emoji: '🔥', name: '5-day fire'    },
  { key: 'streak_7',      emoji: '🥇', name: '7-day legend'  },
  { key: 'streak_30',     emoji: '🌟', name: '30-day star'   },
  { key: 'puzzle_pro',    emoji: '🧩', name: 'Puzzle pro'    },
  { key: 'top_batch',     emoji: '🏆', name: 'Top of batch'  },
  { key: 'abacus_ninja',  emoji: '🥷', name: 'Abacus ninja'  },
  { key: 'first_login',   emoji: '🎉', name: 'First login!'  },
];

function renderBadges(earned) {
  const earnedKeys = new Set((earned||[]).map(b => b.badge_type || b.type || b.key));

  // Show earned first, then show up to 3 locked badges as preview
  const earnedDefs  = BADGE_DEFS.filter(b =>  earnedKeys.has(b.key));
  const lockedDefs  = BADGE_DEFS.filter(b => !earnedKeys.has(b.key)).slice(0, 3);
  const all = [...earnedDefs, ...lockedDefs];

  if (!all.length) return '<div style="font-size:.82rem;color:var(--text3);padding:8px;">Complete activities to earn your first badge!</div>';

  return all.map(b => {
    const isEarned = earnedKeys.has(b.key);
    return `<div class="badge-item ${isEarned ? 'earned' : 'locked'}">
      <div class="badge-emoji">${b.emoji}</div>
      <div class="badge-name">${b.name}</div>
    </div>`;
  }).join('');
}

function getBadgeHint(earned) {
  const earnedKeys = new Set((earned||[]).map(b => b.badge_type || b.type || b.key));
  const next = BADGE_DEFS.find(b => !earnedKeys.has(b.key));
  if (!next) return '<div class="badge-hint">🏆 You have earned all badges! Incredible!</div>';
  const hints = {
    speed_star:    'Answer 10 questions in a row with speed to earn <strong>Speed star</strong>!',
    perfect_score: 'Get 100% on any worksheet to earn <strong>Perfect!</strong>',
    streak_5:      'Login 5 days in a row to earn <strong>5-day fire</strong>!',
    streak_7:      'Login 7 days in a row to earn <strong>7-day legend</strong>!',
    puzzle_pro:    'Solve 5 puzzles to earn <strong>Puzzle pro</strong>!',
    top_batch:     'Reach #1 on the batch leaderboard to earn <strong>Top of batch</strong>!',
    abacus_ninja:  'Complete Level 8 to become an <strong>Abacus ninja</strong>!',
    first_login:   'Just login to earn your first badge!',
  };
  return `<div class="badge-hint">👉 ${hints[next.key] || 'Keep practising to earn more badges!'}</div>`;
}

const RANK_ICONS = ['🥇','🥈','🥉','4','5'];
function renderLeaderboard(lb, myId) {
  if (!lb?.length) return '<div style="padding:12px;text-align:center;color:var(--text3);font-size:.82rem;">Complete activities this week to appear on the leaderboard!</div>';
  const myRank = lb.findIndex(l => l.id === myId);
  const top = lb.slice(0, 5);
  return top.map((l, i) => {
    const isMe = l.id === myId;
    const gap  = i === 0 ? '' : `<div style="font-size:.68rem;color:var(--text3);">${top[0].xp - l.xp} XP behind #1</div>`;
    return `<div class="lb-item ${isMe ? 'lb-you' : ''}">
      <div class="lb-rank">${RANK_ICONS[i]||i+1}</div>
      <div class="lb-name" style="${i===0?'color:var(--orange-dk)':isMe?'color:var(--blue-dk)':'color:var(--text2)'}">${l.name}${isMe?' (you!)':''}</div>
      <div>
        <div class="lb-xp">${l.xp.toLocaleString('en-IN')} XP</div>
        ${!isMe && i > 0 ? gap : ''}
      </div>
    </div>`;
  }).join('') + (myRank > -1 ? `<div class="lb-hint">💪 ${myRank === 0 ? "You're #1 this week! 🏆 Defend your spot!" : `${lb[0].xp - lb[myRank].xp} XP behind #1 — keep going!`}</div>` : '');
}

function getMascotMessage(streak, xpPct, streakInSession=0) {
  if (xpPct >= 90) return "You are SO close to filling the power bar! Just one more session! ✨";
  if (streak >= 5) return `${streak} days in a row — you are AMAZING! Keep going, superstar! 🌟`;
  if (streak === 0) return "I missed you! Come on, let's do some maths magic together today! 🎉";
  return "Just 2 more right answers and the PUZZLE door opens! You can do it! 🚪✨";
}

// ── LOAD ALL LIVE DATA ──────────────────────────────────────
async function loadStats(userId) {
  const stats = {
    homeworkPending:    0,
    practiceToday:      false,
    stickers:           0,
    puzzlesToday:       false,
    weeklyXP:           0,
    leaderboard:        [],
    badges:             [],
    conceptProgress:    [],
    streakInSession:    0,
    questionsToday:     0,   // live count for mission progress bar
    worksheetsToday:    0,   // worksheets submitted today
    quizDoneThisWeek:   false,
    newWorksheets:      0,
  };

  try {
    // 1. Homework pending — from batches this student belongs to
    const { data: batches } = await sb
      .from('batch_students').select('batch_id').eq('student_id', userId);
    const batchIds = (batches || []).map(b => b.batch_id);

    if (batchIds.length) {
      const { data: hw } = await sb
        .from('homework')
        .select('id')
        .in('batch_id', batchIds)
        .eq('is_active', true);
      stats.homeworkPending = hw?.length || 0;
    }

    // 2. Practice today — check practice_sessions
    const todayStart = new Date();
    todayStart.setHours(0,0,0,0);
    const { data: sessions } = await sb
      .from('practice_sessions')
      .select('id')
      .eq('student_id', userId)
      .gte('created_at', todayStart.toISOString())
      .limit(1);
    stats.practiceToday = (sessions?.length || 0) > 0;

    // 3. Badges earned
    const { data: badges } = await sb
      .from('badges')
      .select('*')
      .eq('student_id', userId)
      .order('earned_at', { ascending: false });
    stats.badges = badges || [];

    // 4. Weekly XP — sum from practice_sessions this week
    const weekStart = new Date();
    weekStart.setDate(weekStart.getDate() - weekStart.getDay());
    weekStart.setHours(0,0,0,0);
    const { data: weekSessions } = await sb
      .from('practice_sessions')
      .select('xp_earned')
      .eq('student_id', userId)
      .gte('created_at', weekStart.toISOString());
    stats.weeklyXP = (weekSessions || []).reduce((s,r) => s + (r.xp_earned||0), 0);

    // 5. Leaderboard — top students in same batch by XP this week
    if (batchIds.length) {
      const { data: batchmates } = await sb
        .from('batch_students')
        .select('student_id, users!student_id(full_name, xp_points)')
        .in('batch_id', batchIds);

      if (batchmates?.length) {
        stats.leaderboard = batchmates
          .map(b => ({ name: b.users?.full_name || '?', xp: b.users?.xp_points || 0, id: b.student_id }))
          .sort((a,b) => b.xp - a.xp)
          .slice(0, 5);
      }
    }

    // 6. Sticker count (use badges count as proxy until stickers table exists)
    stats.stickers = stats.badges.length;

    // 7. In-session correct answer streak + total questions today
    const { data: todaySessions } = await sb
      .from('practice_sessions')
      .select('correct_answers, total_questions, session_type')
      .eq('student_id', userId)
      .gte('created_at', todayStart.toISOString())
      .order('created_at', { ascending: false });
    if (todaySessions?.length) {
      stats.streakInSession = todaySessions[0].correct_answers || 0;
      stats.questionsToday = todaySessions.reduce((s,r) => s + (r.total_questions||0), 0);
      stats.worksheetsToday = todaySessions.filter(r => r.session_type==='worksheet').length;
    }

    // 8. Quiz done this week
    const weekNum = (() => { const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()+4-(d.getDay()||7)); const y=new Date(d.getFullYear(),0,1); return Math.ceil((((d-y)/86400000)+1)/7); })();
    const { data: quizDone } = await sb.from('quiz_results')
      .select('id').eq('student_id', userId).eq('week_number', weekNum).limit(1);
    stats.quizDoneThisWeek = (quizDone?.length||0) > 0;

    // 9. New worksheets count
    if (batchIds.length) {
      const { data: wsResponses } = await sb.from('worksheet_responses').select('worksheet_id').eq('student_id', userId);
      const doneIds = new Set((wsResponses||[]).map(r => r.worksheet_id));
      const { data: allWs } = await sb.from('lx_worksheets').select('id').eq('is_active', true)
        .or(\`student_id.eq.\${userId},batch_id.in.(\${batchIds.join(',')})\`);
      stats.newWorksheets = (allWs||[]).filter(w => !doneIds.has(w.id)).length;
    }

  } catch(e) { console.error('loadStats error:', e); }

  // Update homework badge on bottom nav
  if (stats.homeworkPending > 0) {
    const badge = document.getElementById('hwBadge');
    if (badge) badge.style.display = 'flex';
  }

  return stats;
}

// ── AUTH + INIT ──────────────────────────────────────────────
async function logout() {
  await sb.auth.signOut();
  window.location.href = '../../login.html';
}

async function init() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = '../../login.html'; return; }

    // Subscription check
    const active = await checkSubscription(session.user.id);
    if (!active) return;

    // Load profile
    const { data: profile, error } = await sb.from('users').select('*').eq('id', session.user.id).single();
    if (error || !profile) { window.location.href = '../../login.html'; return; }

    // Determine age group
    const group = getGroup(profile);

    // Load stats and notifications in parallel
    const [stats] = await Promise.all([
      loadStats(session.user.id),
      loadNotifications(session.user.id),
    ]);

    // Build dashboard — pass session user id for leaderboard highlight
    buildDashboard(profile, stats, group, session.user.id);

  } catch(err) {
    console.error('Dashboard init error:', err);
    document.getElementById('mainContent').innerHTML = `
      <div style="text-align:center;padding:40px;color:var(--red)">
        Something went wrong. <a href="../../login.html" style="color:var(--blue)">Please login again</a>
      </div>`;
  }
}

init();

// ── LEVEL UP CEREMONY ─────────────────────────────────────────
function checkLevelUp(oldXP, newXP, level) {
  const thresholds = [0,500,1200,2200,3500,5000,7000,9500,12500,16000];
  const oldLevel = thresholds.findIndex((t,i) => oldXP >= t && (i===thresholds.length-1||oldXP<thresholds[i+1]));
  const newLevel = thresholds.findIndex((t,i) => newXP >= t && (i===thresholds.length-1||newXP<thresholds[i+1]));
  if (newLevel > oldLevel && newLevel > 0) showLevelUp(newLevel);
}

function showLevelUp(newLevel) {
  const overlay = document.createElement('div');
  overlay.className = 'levelup-overlay';
  const LEVEL_NAMES = ['','Abacus Beginner','Rising Star','Maths Whiz','Formula Master','Anzan Hero','Multiply Pro','Division Expert','Decimal Wizard','Grand Master'];
  overlay.innerHTML = `<div class="levelup-card">
    <div class="levelup-emoji">🎓</div>
    <div class="levelup-title">Level Up!</div>
    <div class="levelup-sub">You have reached <strong>Level ${newLevel}</strong><br>${LEVEL_NAMES[newLevel]||''}! Keep going — you are amazing! 🌟</div>
    <button class="levelup-btn" onclick="this.closest('.levelup-overlay').remove()">Awesome! 🚀</button>
  </div>`;
  document.body.appendChild(overlay);
  spawnConfetti();
}

function spawnConfetti() {
  const colors = ['#FFD600','#FF6F00','#1E88E5','#8E24AA','#43A047','#E53935'];
  for(let i=0; i<40; i++) {
    const el = document.createElement('div');
    el.style.cssText = `position:fixed;top:-10px;left:${Math.random()*100}%;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'2px'};z-index:9999;animation:confettiFall ${1+Math.random()*2}s ease ${Math.random()*0.5}s forwards;pointer-events:none;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
}

// ── MISSION COUNTDOWN TIMER ──────────────────────────────────
function updateMissionTimer() {
  const el = document.getElementById('missionTimer');
  if (!el) return;
  const now = new Date();
  const midnight = new Date(); midnight.setHours(24,0,0,0);
  const diff = midnight - now;
  const h = Math.floor(diff/3600000);
  const m = Math.floor((diff%3600000)/60000);
  el.textContent = `Resets in ${h}h ${m}m`;
}
updateMissionTimer();
setInterval(updateMissionTimer, 60000);
