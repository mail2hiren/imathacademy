// ── PARSE QUESTIONS from JSON or raw text ──────────────────
function parseQuestions(content){
  // ── Step 1: Try clean JSON array ──────────────────────────
  // Strip markdown code fences if present
  const stripped = content.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();

  // Try to find a JSON array anywhere in the content
  const jsonMatch = stripped.match(/(\[\s*\{[\s\S]*?\}\s*\])/);
  if(jsonMatch){
    try {
      const parsed = JSON.parse(jsonMatch[1]);
      if(Array.isArray(parsed) && parsed.length > 0 && parsed[0]?.question){
        // Clean up each question — strip markdown, separate answer from question
        return parsed.map(q => {
          const ans = cleanAnswer(q.answer);
          return {
            question: stripAnswerFromQuestion(q.question, ans),
            answer:   ans,
            emoji:    q.emoji || '🧮',
            type:     q.type  || 'calculation',
          };
        });
      }
    } catch(e){ console.log('JSON parse failed:', e.message); }
  }

  // ── Step 2: Parse markdown-style numbered list ─────────────
  // Handle format: "**Question 1**: 3 × 12 = ? | (explanation)"
  // or "1. 3 × 12 = ___"
  const wsMatch = content.match(/##\s*(?:WORKSHEET|QUESTIONS)[^\n]*\n([\s\S]*?)(?=##|$)/i);
  const text = wsMatch ? wsMatch[1].trim() : stripped;

  const lines = text.split('\n');
  const questions = [];
  let cur = null;

  for(const line of lines){
    const s = line.trim();
    if(!s) continue;

    // Match: "**Question 1**:", "1.", "Q1.", "1)"
    const m = s.match(/^(?:\*{0,2}(?:Question\s*)?(\d+)\*{0,2}[:.)]\s*|Q?(\d+)[.)\s]\s*)(.+)/i);
    if(m){
      if(cur) questions.push(cur);
      let qtext = cleanText(m[3] || m[2] || '');
      // Strip answer from question if embedded: "3 × 12 = **36** | ..."
      // Remove everything after | (explanation)
      qtext = qtext.replace(/\|.*$/,'').trim();
      // Remove bold answer: "= **36**" → "= ___"
      qtext = qtext.replace(/=\s*\*{1,2}([\d.]+)\*{1,2}/g, '= ?');
      // Remove answer in parentheses at end
      qtext = qtext.replace(/\(\d+[^)]*\)\s*$/,'').trim();
      // Extract answer from question if embedded (e.g. "4 × 6 = 24")
      let embeddedAns = null;
      const eqMatch = qtext.match(/=\s*([\d.]+)\s*(?:[^=?]*)?$/);
      if(eqMatch && !qtext.includes('?') && !qtext.includes('___')) {
        embeddedAns = eqMatch[1];
      }
      qtext = stripAnswerFromQuestion(qtext, embeddedAns);
      cur = { question: qtext, answer: embeddedAns, emoji: '🧮', type: 'calculation' };
    } else if(cur && /^answer\s*:?/i.test(s)){
      cur.answer = cleanAnswer(s.replace(/^answer\s*:?\s*/i,''));
    }
  }
  if(cur) questions.push(cur);
  return questions;
}

// ── TEXT CLEANING ────────────────────────────────────────────
function cleanText(text){
  if(!text) return '';
  return text
    .replace(/\*\*([^*]+)\*\*/g, '$1')   // **bold** → text
    .replace(/\*([^*]+)\*/g, '$1')         // *italic* → text
    .replace(/__([^_]+)__/g, '$1')          // __bold__ → text
    .replace(/_([^_]+)_/g, '$1')            // _italic_ → text
    .replace(/`([^`]+)`/g, '$1')            // `code` → text
    .trim();
}

function cleanAnswer(ans){
  if(ans === null || ans === undefined || ans === '') return null;
  const s = String(ans).trim();
  const cleaned = s
    .replace(/\*\*([^*]+)\*\*/g,'$1')
    .replace(/\*([^*]+)\*/g,'$1')
    .replace(/\|.*$/,'')
    .replace(/\(.*?\)/g,'')
    .trim();
  const numMatch = cleaned.match(/^-?[\d,]+\.?\d*/);
  if(numMatch) return numMatch[0].replace(/,/g,'');
  return cleaned;
}

// ── STRIP ANSWER FROM QUESTION TEXT ──────────────────────────
// The AI sometimes embeds the answer in the question like:
// "4 × 6 = 24 pieces of fruit" or "4 bowls × 6 = 24" or "= **24**"
// We strip everything that reveals the answer to the student.
function stripAnswerFromQuestion(qtext, answer) {
  let q = cleanText(qtext);

  // Remove "= ANSWER" or "= **ANSWER**" at end
  if(answer) {
    const a = String(answer).trim();
    // Remove exact answer after = sign
    q = q.replace(new RegExp('=\\s*\\*{0,2}' + a.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\*{0,2}\\s*[^.]*$', 'i'), '= ?');
    // Remove answer anywhere it appears as a standalone number at end
    q = q.replace(new RegExp('\\s+' + a.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\s*\\.?\\s*$'), '');
  }

  // Remove "= 24 pieces of fruit" style (= number + words)
  q = q.replace(/=\s*\*{0,2}\d+\*{0,2}[^.?]*$/i, '= ?');

  // Remove "Answer: 24" or "Ans: 24" embedded in question
  q = q.replace(/\b(?:ans(?:wer)?|result|solution)\s*[=:]\s*\d+\b/gi, '');

  // Remove "| explanation" suffix
  q = q.replace(/\|.*$/, '').trim();

  // Remove trailing parenthetical with numbers "(= 24)" "(Answer: 24)"
  q = q.replace(/\(\s*(?:=?\s*\d+|answer\s*[=:]?\s*\d+)\s*\)/gi, '').trim();

  // Remove trailing number after the last operator × ÷ + -
  // e.g. "4 × 6 = 24" → "4 × 6 = ?"  (already handled above)
  // "4 bowls × 6 pieces each = 24 pieces of fruit" → "4 bowls × 6 pieces each = ?"
  q = q.replace(/([×÷+\-]\s*\d+[^=]*)=\s*[\d.]+.*$/i, '$1= ?');

  // If question ends with just a number (the answer), remove it
  if(answer) {
    const a = String(answer).trim();
    const endsWithAnswer = new RegExp('\\s+' + a.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\s*\\.?$');
    q = q.replace(endsWithAnswer, '').trim();
  }

  // Clean up multiple spaces
  q = q.replace(/\s{2,}/g,' ').trim();

  // If question now ends with "=" add "?" 
  if(q.endsWith('=')) q += ' ?';

  return q;
}

function getHint(content){
  const m = content.match(/##\s*HINT[^\n]*\n([\s\S]*?)(?=##|$)/i);
  return m ? m[1].trim() : null;
}

function getStatus(ws){
  const r=responses[ws.id];
  if(!r) return 'new';
  if(r.submitted) return 'done';
  return 'inprogress';
}

function getGroup(){
  const lv=currentUser?.current_level||1;
  return currentUser?.age_group||(lv<=1?'tiny':lv<=4?'rising':'champions');
}

// ── FILTER ─────────────────────────────────────────────────
function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn?.classList.add('active');
  renderList();
}

// ── RENDER LIST ────────────────────────────────────────────
function renderList(){
  const list=document.getElementById('wsList');
  let items=allWs;
  if(filter!=='all') items=allWs.filter(w=>getStatus(w)===filter);
  if(!items.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">${filter==='done'?'✅':'📋'}</div><div style="font-size:.875rem;">${filter==='new'?'No new worksheets — great work!':filter==='done'?'No completed worksheets yet.':'Your teacher hasn\'t assigned worksheets yet.'}</div></div>`;
    return;
  }
  list.innerHTML=items.map(ws=>renderCard(ws)).join('');
}

function renderCard(ws){
  const status=getStatus(ws);
  const qs=parseQuestions(ws.content||'');
  const r=responses[ws.id]||{};
  const iconBg=LEVEL_ICONS[ws.level||1];
  const pill=status==='done'?'<span class="ws-pill pill-done">✅ Done</span>':status==='inprogress'?'<span class="ws-pill pill-inprogress">✏️ In progress</span>':'<span class="ws-pill pill-new">🆕 New</span>';

  return `<div class="ws-card ${status==='new'?'is-new':''}" id="card-${ws.id}">
    <div class="ws-header" onclick="toggleCard('${ws.id}')">
      <div class="ws-icon" style="background:#E3F2FD;">${iconBg}</div>
      <div class="ws-info">
        <div class="ws-title">${ws.title}</div>
        <div class="ws-meta">
          <span>Level ${ws.level||'—'}</span><span>·</span>
          <span>${qs.length} question${qs.length!==1?'s':''}</span><span>·</span>
          <span>${new Date(ws.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
        ${pill}
        ${r.score!==undefined?`<span style="font-size:.72rem;font-weight:800;color:${r.pct>=80?'var(--green-dk)':'var(--orange-dk)'};">${r.score}/${qs.length}</span>`:''}
      </div>
    </div>
    <div class="solver" id="solver-${ws.id}">
      ${renderSolver(ws,qs,r,status)}
    </div>
  </div>`;
}

function renderSolver(ws,qs,r,status){
  if(status==='done') return renderResult(ws,qs,r);
  const group=getGroup();
  const hint=getHint(ws.content||'');
  const cur=r.currentQ||0;
  const pct=qs.length?Math.round((cur/qs.length)*100):0;

  return `<div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="q-wrap">
      <div class="q-counter">Question ${cur+1} of ${qs.length}</div>
      ${hint?`<button class="hint-toggle" onclick="toggleHint('${ws.id}')">💡 Show formula hint</button><div class="hint-box" id="hint-${ws.id}" style="display:none;"><div style="font-size:.75rem;font-weight:800;color:var(--yellow-dk);margin-bottom:4px;">Formula reminder</div><div style="font-size:.82rem;line-height:1.7;white-space:pre-wrap;">${hint}</div></div>`:''}
      ${qs.length?renderQuestion(ws.id, qs[cur], cur, group):'<div style="padding:20px;text-align:center;color:var(--text3);">No questions found in this worksheet.</div>'}
    </div>
    ${qs.length?`<div class="q-nav">
      ${cur>0?`<button class="q-nav-btn btn-prev" onclick="prevQ('${ws.id}')">← Back</button>`:''}
      <button class="q-nav-btn btn-check" id="checkBtn-${ws.id}" onclick="checkAnswer('${ws.id}',${cur},'${encodeAnswers(qs)}')">Check answer</button>
    </div>`:''}
  </div>`;
}

function encodeAnswers(qs){
  return btoa(JSON.stringify(qs.map(q=>q.answer||'')));
}

function renderQuestion(wsId, q, idx, group){
  if(group==='tiny'){
    return `<div class="tiny-q">
      <div class="tiny-emoji">${q.emoji||'🧮'}</div>
      <div class="tiny-text">${q.question}</div>
      <input class="tiny-input" id="inp-${wsId}-${idx}" type="text" inputmode="numeric" placeholder="?" autocomplete="off"
        onkeydown="if(event.key==='Enter')checkAnswer('${wsId}',${idx},'')">
    </div>
    <div class="feedback" id="fb-${wsId}-${idx}"></div>`;
  }
  return `<div class="q-card">
    <div class="q-text">${q.question}</div>
    <input class="q-input" id="inp-${wsId}-${idx}" type="text" inputmode="numeric" placeholder="Your answer..." autocomplete="off"
      onkeydown="if(event.key==='Enter')checkAnswer('${wsId}',${idx},'')">
  </div>
  <div class="feedback" id="fb-${wsId}-${idx}"></div>`;
}

function renderResult(ws, qs, r){
  const pct=r.pct||0;
  const trophy=pct>=80?'🏆':pct>=50?'⭐':'💪';
  const msg=pct>=80?'Excellent work!':pct>=50?'Good effort — keep going!':'Keep practising — you can do it!';
  const color=pct>=80?'var(--green-dk)':pct>=50?'var(--orange-dk)':'var(--red-dk)';
  return `<div class="result-screen">
    <div class="result-trophy">${trophy}</div>
    <div class="result-score" style="color:${color};">${r.score}/${qs.length}</div>
    <div class="result-msg" style="color:${color};">${msg}</div>
    <div style="background:var(--orange-lt);border:2px solid var(--orange);border-radius:14px;padding:12px;margin-bottom:16px;">
      <div style="font-size:.875rem;font-weight:800;color:var(--orange-dk);">+${r.xp||0} XP earned! ⚡</div>
    </div>
    <div class="result-breakdown">
      <div style="font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px;">Your answers</div>
      ${qs.map((q,i)=>`<div class="result-row">
        <div class="result-qnum">${i+1}</div>
        <div class="result-qtext" style="font-size:.78rem;">${q.question.slice(0,50)}${q.question.length>50?'...':''}</div>
        <div class="result-ans" style="color:${r.correct?.[i]?'var(--green-dk)':'var(--red-dk)'};">${r.answers?.[i]||'—'} ${r.correct?.[i]?'✅':'❌'}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

// ── INTERACTION ────────────────────────────────────────────
function toggleCard(id){
  const solver=document.getElementById('solver-'+id);
  if(!solver) return;
  const isOpen=solver.classList.contains('open');
  document.querySelectorAll('.solver').forEach(s=>s.classList.remove('open'));
  if(!isOpen){
    solver.classList.add('open');
    setTimeout(()=>document.querySelector(`#solver-${id} input`)?.focus(),150);
  }
}

function toggleHint(wsId){
  const h=document.getElementById('hint-'+wsId);
  if(h) h.style.display=h.style.display==='none'?'block':'none';
}

function checkAnswer(wsId, qIdx, encodedAnswers){
  const ws=allWs.find(w=>w.id===wsId);
  if(!ws) return;
  const qs=parseQuestions(ws.content||'');
  const q=qs[qIdx];
  const input=document.getElementById(`inp-${wsId}-${qIdx}`);
  const fb=document.getElementById(`fb-${wsId}-${qIdx}`);
  if(!input||!fb) return;

  const val=input.value.trim();
  if(!val){input.focus();return;}

  // Check answer
  const expected = cleanAnswer(String(q.answer||''));
  const given    = cleanAnswer(val.trim());
  const isCorrect = expected && (given === expected || (!isNaN(parseFloat(given)) && !isNaN(parseFloat(expected)) && Math.abs(parseFloat(given)-parseFloat(expected)) < 0.001));

  input.classList.add(isCorrect?'correct':'wrong');
  fb.className=`feedback show ${isCorrect?'correct':'wrong'}`;
  fb.textContent=isCorrect?`✅ Correct! Well done!`:`❌ Not quite. ${expected?'Answer: '+expected:'Try again!'}`;

  // Store answer
  if(!responses[wsId]) responses[wsId]={answers:{},correct:{},currentQ:0};
  responses[wsId].answers[qIdx]=val;
  responses[wsId].correct[qIdx]=isCorrect;

  // XP pop on correct
  if(isCorrect) showXPPop('+10 XP! ⚡');

  // Change button to Next
  const checkBtn=document.getElementById(`checkBtn-${wsId}`);
  if(checkBtn){
    if(qIdx < qs.length-1){
      checkBtn.textContent='Next →';
      checkBtn.onclick=()=>nextQ(wsId, qIdx, qs);
      checkBtn.className='q-nav-btn btn-next';
    } else {
      checkBtn.textContent='Submit all ✓';
      checkBtn.onclick=()=>submitWorksheet(wsId, qs);
      checkBtn.className='q-nav-btn btn-next';
    }
  }
}

function nextQ(wsId, curIdx, qs){
  const nextIdx=curIdx+1;
  if(!responses[wsId]) responses[wsId]={answers:{},correct:{},currentQ:0};
  responses[wsId].currentQ=nextIdx;

  // Re-render solver in place
  const solver=document.getElementById('solver-'+wsId);
  const ws=allWs.find(w=>w.id===wsId);
  if(!solver||!ws) return;
  solver.innerHTML=renderSolver(ws, qs, responses[wsId], 'new');
  solver.classList.add('open');
  setTimeout(()=>document.querySelector(`#solver-${wsId} input`)?.focus(),100);
}

function prevQ(wsId){
  if(!responses[wsId]) return;
  responses[wsId].currentQ=Math.max(0,(responses[wsId].currentQ||1)-1);
  const ws=allWs.find(w=>w.id===wsId);
  const solver=document.getElementById('solver-'+wsId);
  if(!ws||!solver) return;
  const qs=parseQuestions(ws.content||'');
  solver.innerHTML=renderSolver(ws,qs,responses[wsId],'new');
  solver.classList.add('open');
}

async function submitWorksheet(wsId, qs){
  const r=responses[wsId]||{};
  const score=Object.values(r.correct||{}).filter(Boolean).length;
  const total=qs.length;
  const pct=Math.round(score/total*100);
  const xp=Math.max(5,Math.round(pct/100*25));

  responses[wsId]={...r, submitted:true, score, pct, xp};

  try{
    const{data:{session}}=await sb.auth.getSession();
    await sb.from('worksheet_responses').upsert({
      worksheet_id:wsId, student_id:session.user.id,
      answers:JSON.stringify(r.answers), score, total, xp_earned:xp,
      submitted_at:new Date().toISOString()
    });
    await sb.from('practice_sessions').insert({
      student_id:session.user.id, questions_correct:score,
      questions_attempted:total, xp_awarded:xp, topic:'worksheet'
    });
    await sb.from('users').update({xp_points:(currentUser.xp_points||0)+xp}).eq('id',session.user.id);
    currentUser.xp_points=(currentUser.xp_points||0)+xp;

    // Notify the teacher who assigned this worksheet
    try {
      const { data: wsData } = await sb.from('lx_worksheets').select('created_by, title').eq('id',wsId).single();
      if (wsData?.created_by) {
        await sb.from('notifications').insert({
          user_id: wsData.created_by,
          type: 'submission',
          title: '📊 Worksheet submitted!',
          message: (currentUser.full_name||'A student') + ' submitted "' + wsData.title + '" — Score: ' + score + '/' + total + ' (' + pct + '%)',
        });
      }
    } catch(e) { console.log('Teacher notify error:', e); }
  }catch(e){console.error('submit error:',e);}

  showXPPop(`+${xp} XP! 🎉`);

  // Re-render card with result
  const card=document.getElementById('card-'+wsId);
  if(card){
    const tmp=document.createElement('div');
    tmp.innerHTML=renderCard(allWs.find(w=>w.id===wsId));
    card.replaceWith(tmp.firstElementChild);
    toggleCard(wsId);
  }
}

function showXPPop(text){
  const el=document.createElement('div');
  el.className='xp-pop';
  el.textContent=text;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1300);
}

// ── INIT ──────────────────────────────────────────────────
async function init(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(!session){window.location.href='../../login.html';return;}
    const{data:profile}=await sb.from('users').select('*').eq('id',session.user.id).single();
    if(!profile||profile.role!=='student'){window.location.href='../../login.html';return;}
    currentUser={...profile,id:session.user.id};
    const ok=await checkSub(session.user.id);
    if(!ok) return;

    // Load batches
    const{data:batchLinks}=await sb.from('batch_students').select('batch_id').eq('student_id',session.user.id);
    const batchIds=(batchLinks||[]).map(b=>b.batch_id);

    // Load worksheets
    let wsData=[];
    if(batchIds.length){
      const{data}=await sb.from('lx_worksheets').select('*').eq('is_active',true)
        .or(`student_id.eq.${session.user.id},batch_id.in.(${batchIds.join(',')})`)
        .order('created_at',{ascending:false});
      wsData=data||[];
    } else {
      const{data}=await sb.from('lx_worksheets').select('*').eq('is_active',true)
        .eq('student_id',session.user.id).order('created_at',{ascending:false});
      wsData=data||[];
    }
    allWs=wsData;

    // Load submitted responses
    const{data:subs}=await sb.from('worksheet_responses').select('*').eq('student_id',session.user.id);
    (subs||[]).forEach(s=>{
      responses[s.worksheet_id]={
        submitted:true, score:s.score, pct:Math.round(s.score/s.total*100),
        xp:s.xp_earned, answers:JSON.parse(s.answers||'{}'), correct:{}
      };
    });

    // New badge
    const newCount=allWs.filter(w=>getStatus(w)==='new').length;
    const badge=document.getElementById('newBadge');
    if(newCount>0){badge.textContent=newCount+' new';badge.style.display='inline-block';}

    renderList();
  }catch(err){
    document.getElementById('wsList').innerHTML=`<div style="padding:40px;text-align:center;color:var(--red);">Error: ${err.message}</div>`;
  }
}

init();

  function toggleSidebar() {
    const s = document.getElementById('sidebar');
    const o = document.getElementById('overlay');
    s?.classList.toggle('open');
    o?.classList.toggle('show');
  }
  function closeSidebar() {
    document.getElementById('sidebar')?.classList.remove('open');
    document.getElementById('overlay')?.classList.remove('show');
  }
</script>
