<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Weekly Quiz — iMathAcademy</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'Nunito',sans-serif;background:#F7F8FF;color:#1A1A2E;min-height:100vh;}
    :root{
      --green:#43A047;--green-dk:#1B5E20;--green-lt:#E8F5E9;
      --blue:#1E88E5;--blue-dk:#0D47A1;--blue-lt:#E3F2FD;
      --orange:#FB8C00;--orange-dk:#E65100;--orange-lt:#FFF3E0;
      --purple:#8E24AA;--purple-lt:#F3E5F5;--purple-dk:#4A148C;
      --red:#E53935;--red-lt:#FFEBEE;--red-dk:#B71C1C;
      --yellow:#F9A825;--yellow-lt:#FFFDE7;
      --bg:#fff;--bg2:#F7F8FF;--border:#E8EAF6;
      --text:#1A1A2E;--text2:#4A4A6A;--text3:#9090B0;
    }
    .topbar{height:56px;background:var(--bg);border-bottom:2px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.04);}
    .topbar img{height:32px;width:auto;object-fit:contain;}
    .topbar-title{font-family:'Baloo 2',sans-serif;font-size:1rem;font-weight:800;flex:1;}
    .content{padding:14px;max-width:600px;margin:0 auto;padding-bottom:80px;}
    .card{background:var(--bg);border:2px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;}
    .spinner{width:32px;height:32px;border:4px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Timer */
    .timer-bar{height:6px;background:var(--border);border-radius:20px;margin-bottom:16px;overflow:hidden;}
    .timer-fill{height:100%;border-radius:20px;transition:width 1s linear;background:linear-gradient(90deg,var(--green),var(--blue));}
    .timer-fill.danger{background:linear-gradient(90deg,var(--orange),var(--red));}
    .timer-num{font-size:.78rem;font-weight:800;text-align:right;margin-top:4px;color:var(--text3);}

    /* Question */
    .q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .q-num{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);}
    .q-level{font-size:.7rem;font-weight:800;background:var(--purple-lt);color:var(--purple-dk);padding:3px 10px;border-radius:20px;}
    .q-text{font-size:1.1rem;font-weight:700;line-height:1.5;margin-bottom:16px;}
    .options{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .option-btn{padding:14px;border:2px solid var(--border);border-radius:12px;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;background:var(--bg);transition:all .12s;touch-action:manipulation;text-align:center;}
    .option-btn:hover{border-color:var(--blue);background:var(--blue-lt);}
    .option-btn.selected{border-color:var(--blue);background:var(--blue-lt);color:var(--blue-dk);}
    .option-btn.correct{border-color:var(--green);background:var(--green-lt);color:var(--green-dk);}
    .option-btn.wrong{border-color:var(--red);background:var(--red-lt);color:var(--red-dk);}
    .option-btn:disabled{cursor:not-allowed;}

    /* Input for non-MCQ */
    .q-input{width:100%;padding:14px;border:2px solid var(--border);border-radius:12px;font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:700;text-align:center;outline:none;margin-bottom:12px;transition:border-color .12s;}
    .q-input:focus{border-color:var(--blue);}

    /* Next btn */
    .next-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;margin-top:12px;touch-action:manipulation;display:none;}
    .next-btn.show{display:block;}

    /* XP pop */
    .xp-pop{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:2rem;font-weight:900;pointer-events:none;z-index:9999;animation:xpFloat 1.2s ease forwards;}
    @keyframes xpFloat{0%{opacity:0;transform:translate(-50%,-60%)}20%{opacity:1}80%{opacity:1;transform:translate(-50%,-130%)}100%{opacity:0}}

    /* Leaderboard */
    .lb-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
    .lb-row:last-child{border-bottom:none;}
    .lb-rank{font-size:1.1rem;width:28px;text-align:center;}
    .lb-name{flex:1;font-size:.875rem;font-weight:700;}
    .lb-score{font-size:.875rem;font-weight:800;}
    .lb-time{font-size:.72rem;color:var(--text3);}

    /* Result banner */
    .result-banner{border-radius:16px;padding:20px;text-align:center;margin-bottom:14px;}
    .result-score{font-size:2.5rem;font-weight:900;margin-bottom:6px;}
    .result-msg{font-size:.9rem;font-weight:700;}

    /* Intro screen */
    .intro{text-align:center;padding:20px;}
    .intro-icon{font-size:4rem;margin-bottom:12px;}
    .intro-title{font-family:'Baloo 2',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:8px;}
    .intro-sub{font-size:.875rem;color:var(--text2);line-height:1.6;margin-bottom:20px;}
    .start-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;touch-action:manipulation;}
    .info-row{display:flex;justify-content:center;gap:24px;margin-bottom:20px;}
    .info-item{text-align:center;}
    .info-num{font-size:1.3rem;font-weight:800;color:var(--blue-dk);}
    .info-lbl{font-size:.68rem;color:var(--text3);font-weight:700;}

    /* Bottom nav */
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--bg);border-top:2px solid var(--border);z-index:200;}
    .bottom-nav-inner{display:flex;height:100%;}
    .bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;border:none;background:none;padding:4px 0;min-height:44px;}
    .bnav-icon{font-size:1.3rem;}.bnav-label{font-size:.62rem;font-weight:700;color:var(--text3);font-family:inherit;}
    .bnav-item.active .bnav-label{color:var(--blue-dk);}
    @media(max-width:768px){.bottom-nav{display:block;}body{padding-bottom:64px;}}
  .sidebar {
      width:220px; flex-shrink:0; background:var(--bg);
      border-right:2px solid var(--border); display:flex;
      flex-direction:column; position:fixed; top:0; left:0;
      height:100vh; overflow-y:auto; z-index:100; transition:transform .3s;
    }
    .sidebar-logo {
      padding:20px 16px; border-bottom:2px solid var(--border);
      font-family:'Baloo 2',sans-serif; font-size:1.2rem; font-weight:800;
      color:var(--green-dk); display:flex; align-items:center; gap:10px;
    }
    .sidebar-logo span { color:var(--orange-dk); }
    .logo-icon { width:34px; height:34px; background:var(--green); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; }
    .sidebar-nav { flex:1; padding:12px 0; }
    .nav-section { font-size:.68rem; font-weight:800; text-transform:uppercase; letter-spacing:.8px; color:var(--text3); padding:8px 16px 3px; margin-top:6px; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:10px 16px; font-size:.875rem; font-weight:700; color:var(--text2); cursor:pointer; border-left:3px solid transparent; transition:all .12s; text-decoration:none; }
    .nav-item:hover { color:var(--text); background:var(--bg2); }
    .nav-item.active { color:var(--orange-dk); background:var(--orange-lt); border-left-color:var(--orange); }
    .nav-icon { width:20px; text-align:center; font-size:1rem; }
    .nav-badge { margin-left:auto; background:var(--red); color:#fff; font-size:.62rem; font-weight:800; padding:2px 6px; border-radius:20px; min-width:18px; text-align:center; }
    .sidebar-user { padding:14px 16px; border-top:2px solid var(--border); display:flex; align-items:center; gap:10px; }
    .user-av { width:36px; height:36px; border-radius:50%; background:var(--green-lt); border:2px solid var(--green); display:flex; align-items:center; justify-content:center; font-size:.8rem; font-weight:800; color:var(--green-dk); flex-shrink:0; }
    .user-name { font-size:.82rem; font-weight:800; color:var(--text); }
    .user-role { font-size:.7rem; color:var(--text3); font-weight:600; }
    .logout-btn { margin-left:auto; background:none; border:none; font-size:.85rem; cursor:pointer; color:var(--text3); }
    .logout-btn:hover { color:var(--red); }

    .main { flex:1; margin-left:220px; display:flex; flex-direction:column; }
    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://bhullfoajenhkxlkiubs.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJodWxsZm9hamVuaGt4bGtpdWJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MzcwMjUsImV4cCI6MjA5MzExMzAyNX0.RUcKFGluRhu9H8sZdLb-ow4ORoCd2-oIzYXJqyNZ5Uc';
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

let currentUser=null, questions=[], currentQ=0, score=0, answers=[], timerInterval=null;
let timeLeft=600, totalTime=600; // 10 minutes
let startTime=null;

const QUIZ_TOTAL = 10;
const RANK_ICONS = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];

async function checkSub(uid){
  const{data}=await sb.from('subscriptions').select('expires_at').eq('student_id',uid).eq('status','active').order('expires_at',{ascending:false}).limit(1);
  if(!data?.length||new Date(data[0].expires_at)<new Date()){window.location.href='subscription.html';return false;}
  return true;
}

// ── GENERATE QUIZ using Edge Function ─────────────────────
async function generateQuiz(level, group) {
  const{data:{session}}=await sb.auth.getSession();
  const prompt = `Generate exactly ${QUIZ_TOTAL} Abacus Level ${level} quiz questions for a ${group==='tiny'?'5-7 year old':group==='rising'?'8-10 year old':'11-12 year old'} student.

Return ONLY a JSON array. Each object:
{
  "question": "question text",
  "options": ["option A", "option B", "option C", "option D"],
  "answer": "correct option text",
  "emoji": "relevant emoji"
}

Rules: All maths correct. Indian names/context. Mix of difficulty. Level ${level} concepts only (${level<=1?'Big/Small friends 2-digit':level<=4?'Combination formula '+level+'-digit':level<=5?'Multiplication 2x1 3x1':'Division and '+level+'-digit'}).
Return ONLY the JSON array, no other text.`;

  try {
    const resp = await fetch('https://bhullfoajenhkxlkiubs.supabase.co/functions/v1/generate-worksheet', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${session.access_token}`},
      body: JSON.stringify({prompt, preview:false})
    });
    const data = await resp.json();
    const text = data.text || '';
    const match = text.match(/\[[\s\S]*\]/);
    if(match) return JSON.parse(match[0]);
  } catch(e) { console.error('Quiz gen error:', e); }

  // Fallback: generate locally
  return generateLocalQuiz(level, QUIZ_TOTAL);
}

function generateLocalQuiz(level, count) {
  const qs = [];
  for(let i=0; i<count; i++) {
    let a, b, ans, q;
    if(level <= 2) {
      a = Math.floor(Math.random()*50)+1;
      b = Math.floor(Math.random()*30)+1;
      const isAdd = Math.random()>0.4;
      ans = isAdd ? a+b : Math.abs(a-b);
      q = isAdd ? `${a} + ${b} = ?` : `${Math.max(a,b)} − ${Math.min(a,b)} = ?`;
    } else if(level <= 4) {
      a = Math.floor(Math.random()*500)+100;
      b = Math.floor(Math.random()*300)+50;
      const isAdd = Math.random()>0.4;
      ans = isAdd ? a+b : Math.abs(a-b);
      q = isAdd ? `${a} + ${b} = ?` : `${Math.max(a,b)} − ${Math.min(a,b)} = ?`;
    } else if(level === 5) {
      a = Math.floor(Math.random()*9)+1;
      b = Math.floor(Math.random()*99)+10;
      ans = a*b; q = `${a} × ${b} = ?`;
    } else {
      a = Math.floor(Math.random()*9)+2;
      b = a * (Math.floor(Math.random()*9)+1);
      ans = b/a; q = `${b} ÷ ${a} = ?`;
    }
    const wrong1 = ans + Math.floor(Math.random()*10)+1;
    const wrong2 = Math.max(0, ans - Math.floor(Math.random()*10)-1);
    const wrong3 = ans + (Math.random()>0.5?5:-5);
    const opts = [ans, wrong1, wrong2, wrong3].sort(()=>Math.random()-0.5).map(String);
    qs.push({ question:q, options:opts, answer:String(ans), emoji:'🧮' });
  }
  return qs;
}

// ── SCREENS ────────────────────────────────────────────────
function showIntro(level, group, alreadyDone) {
  const main = document.getElementById('mainContent');
  const daysSince = alreadyDone ? 0 : null;

  main.innerHTML = `<div class="card">
    <div class="intro">
      <div class="intro-icon">⚡</div>
      <div class="intro-title">Weekly Quiz — Level ${level}</div>
      <div class="intro-sub">${group==='tiny'?'🐣 Tiny Champs':group==='rising'?'🌟 Rising Stars':'🚀 Champions'} · ${QUIZ_TOTAL} questions · 10 minutes</div>
      <div class="info-row">
        <div class="info-item"><div class="info-num">${QUIZ_TOTAL}</div><div class="info-lbl">Questions</div></div>
        <div class="info-item"><div class="info-num">10</div><div class="info-lbl">Minutes</div></div>
        <div class="info-item"><div class="info-num">50</div><div class="info-lbl">Max XP</div></div>
      </div>
      ${alreadyDone ? `<div style="background:var(--green-lt);border:2px solid var(--green);border-radius:12px;padding:12px;margin-bottom:16px;font-size:.875rem;color:var(--green-dk);font-weight:700;">✅ You already completed this week's quiz! See your result below or retake for practice.</div>` : ''}
      <button class="start-btn" onclick="startQuiz()" id="startBtn">
        ${alreadyDone ? '🔄 Retake for practice' : '⚡ Start quiz'}
      </button>
    </div>
  </div>
  ${alreadyDone ? '<div id="lbSection"></div>' : ''}`;

  if(alreadyDone) loadLeaderboard();
}

async function startQuiz() {
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = '⏳ Generating quiz...';

  const level = currentUser.current_level || 1;
  const group = currentUser.age_group || (level<=1?'tiny':level<=4?'rising':'champions');

  questions = await generateQuiz(level, group);
  currentQ = 0; score = 0; answers = [];
  startTime = Date.now();
  timeLeft = totalTime = (group==='champions'?600:group==='rising'?720:900);

  showQuestion();
  startTimer();
}

function startTimer() {
  const display = document.getElementById('timerDisplay');
  if(display) display.style.display = 'block';
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft/60);
    const s = timeLeft%60;
    if(display) display.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    // Update bar
    const fill = document.getElementById('timerFill');
    const pct = (timeLeft/totalTime)*100;
    if(fill) {
      fill.style.width = pct+'%';
      if(pct < 25) fill.classList.add('danger');
    }
    if(timeLeft <= 0) { clearInterval(timerInterval); submitQuiz(true); }
  }, 1000);
}

function showQuestion() {
  const q = questions[currentQ];
  if(!q) { submitQuiz(false); return; }
  const pct = (timeLeft/totalTime)*100;
  const isInput = !q.options || q.options.length === 0;
  const main = document.getElementById('mainContent');

  main.innerHTML = `<div class="card">
    <div class="timer-bar"><div class="timer-fill ${pct<25?'danger':''}" id="timerFill" style="width:${pct}%"></div></div>
    <div class="q-header">
      <div class="q-num">Q${currentQ+1} of ${questions.length}</div>
      <div class="q-level">Level ${currentUser.current_level||1}</div>
    </div>
    <div class="q-text">${q.emoji||'🧮'} ${q.question}</div>
    ${isInput
      ? `<input class="q-input" id="ansInput" type="text" inputmode="numeric" placeholder="Your answer..." autocomplete="off" onkeydown="if(event.key==='Enter')checkMCQ(null)">`
      : `<div class="options">${(q.options||[]).map((opt,i)=>`<button class="option-btn" id="opt-${i}" onclick="checkMCQ('${opt}')">${opt}</button>`).join('')}</div>`
    }
    <div id="feedback" style="display:none;padding:10px 12px;border-radius:12px;font-size:.875rem;font-weight:700;margin-top:10px;text-align:center;"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">${currentQ===questions.length-1?'See results →':'Next →'}</button>
  </div>`;
}

function checkMCQ(selected) {
  const q = questions[currentQ];
  if(!selected) {
    const inp = document.getElementById('ansInput');
    selected = inp?.value?.trim() || '';
    if(!selected) { inp?.focus(); return; }
  }

  const correct = selected.toString().trim() === (q.answer||'').toString().trim() ||
    parseFloat(selected) === parseFloat(q.answer);

  answers[currentQ] = { selected, correct };
  if(correct) { score++; showXPPop('+5 XP! ✅'); }

  // Show feedback
  const fb = document.getElementById('feedback');
  if(fb) {
    fb.style.display = 'block';
    fb.style.background = correct ? 'var(--green-lt)' : 'var(--red-lt)';
    fb.style.color = correct ? 'var(--green-dk)' : 'var(--red-dk)';
    fb.textContent = correct ? '✅ Correct!' : `❌ Answer: ${q.answer}`;
  }

  // Highlight options
  if(q.options) {
    q.options.forEach((opt,i) => {
      const btn = document.getElementById('opt-'+i);
      if(!btn) return;
      btn.disabled = true;
      if(opt.toString() === q.answer.toString()) btn.classList.add('correct');
      else if(opt.toString() === selected.toString()) btn.classList.add('wrong');
    });
  }

  // Disable input
  const inp = document.getElementById('ansInput');
  if(inp) { inp.disabled = true; inp.classList.add(correct?'correct':'wrong'); }

  // Show next
  const next = document.getElementById('nextBtn');
  if(next) next.classList.add('show');
}

function nextQuestion() {
  currentQ++;
  if(currentQ >= questions.length) { submitQuiz(false); return; }
  showQuestion();
}

async function submitQuiz(timedOut) {
  clearInterval(timerInterval);
  document.getElementById('timerDisplay').style.display = 'none';
  const timeTaken = Math.floor((Date.now()-startTime)/1000);
  const pct = Math.round(score/questions.length*100);
  const xp = Math.min(50, score*5);

  // Save to DB
  try {
    const{data:{session}}=await sb.auth.getSession();
    await sb.from('quiz_results').insert({
      student_id: session.user.id,
      level: currentUser.current_level||1,
      score, total: questions.length,
      pct, xp_awarded: xp, time_taken: timeTaken,
      week_number: getWeekNumber()
    });
    await sb.from('practice_sessions').insert({
      student_id: session.user.id, questions_correct: score,
      questions_attempted: questions.length, xp_awarded: xp, topic: 'quiz'
    });
    await sb.from('users').update({xp_points:(currentUser.xp_points||0)+xp}).eq('id',session.user.id);
    currentUser.xp_points = (currentUser.xp_points||0)+xp;
  } catch(e){ console.error('save quiz:', e); }

  showResult(score, questions.length, pct, xp, timeTaken, timedOut);
}

function showResult(score, total, pct, xp, timeSecs, timedOut) {
  const trophy = pct>=80?'🏆':pct>=50?'⭐':'💪';
  const color = pct>=80?'var(--green-dk)':pct>=50?'var(--orange-dk)':'var(--red-dk)';
  const msg = pct>=80?'Outstanding! 🎉':pct>=50?'Well done — keep going! 💪':'Don\'t give up — practice makes perfect! 🌟';
  const mins = Math.floor(timeSecs/60), secs = timeSecs%60;

  document.getElementById('mainContent').innerHTML = `
    <div class="card result-banner" style="background:${pct>=80?'var(--green-lt)':pct>=50?'var(--yellow-lt)':'var(--red-lt)'};border-color:${pct>=80?'var(--green)':pct>=50?'var(--yellow)':'var(--red)'};">
      <div style="font-size:3.5rem;margin-bottom:8px;">${trophy}</div>
      <div class="result-score" style="color:${color};">${score}/${total}</div>
      <div class="result-msg" style="color:${color};">${msg}</div>
      ${timedOut?'<div style="font-size:.78rem;margin-top:8px;opacity:.7;">Time ran out!</div>':''}
    </div>
    <div class="card" style="display:flex;gap:0;padding:0;overflow:hidden;">
      <div style="flex:1;text-align:center;padding:16px;border-right:1px solid var(--border);">
        <div style="font-size:1.4rem;font-weight:800;color:var(--orange-dk);">+${xp}</div>
        <div style="font-size:.72rem;color:var(--text3);font-weight:700;">XP earned</div>
      </div>
      <div style="flex:1;text-align:center;padding:16px;border-right:1px solid var(--border);">
        <div style="font-size:1.4rem;font-weight:800;color:var(--blue-dk);">${pct}%</div>
        <div style="font-size:.72rem;color:var(--text3);font-weight:700;">Accuracy</div>
      </div>
      <div style="flex:1;text-align:center;padding:16px;">
        <div style="font-size:1.4rem;font-weight:800;color:var(--purple-dk);">${mins}:${secs.toString().padStart(2,'0')}</div>
        <div style="font-size:.72rem;color:var(--text3);font-weight:700;">Time taken</div>
      </div>
    </div>
    <div class="card">
      <div style="font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:12px;">🏆 Batch leaderboard this week</div>
      <div id="lbSection"><div class="spinner" style="width:24px;height:24px;border-width:3px;"></div></div>
    </div>
    <button onclick="location.href='dashboard.html'" style="width:100%;padding:14px;background:var(--bg);border:2px solid var(--border);border-radius:12px;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:800;cursor:pointer;margin-top:4px;">← Back to dashboard</button>`;

  loadLeaderboard();
}

async function loadLeaderboard() {
  const section = document.getElementById('lbSection');
  if(!section) return;
  try {
    const{data:batchLinks}=await sb.from('batch_students').select('batch_id').eq('student_id',currentUser.id);
    const batchIds=(batchLinks||[]).map(b=>b.batch_id);
    if(!batchIds.length){section.innerHTML='<div style="color:var(--text3);font-size:.82rem;">No batch assigned yet</div>';return;}

    const{data:batchmates}=await sb.from('batch_students').select('student_id').in('batch_id',batchIds);
    const studentIds=[...new Set((batchmates||[]).map(b=>b.student_id))];

    const week=getWeekNumber();
    const{data:results}=await sb.from('quiz_results')
      .select('student_id, score, total, pct, time_taken, users!student_id(full_name)')
      .in('student_id',studentIds)
      .eq('week_number',week)
      .order('pct',{ascending:false})
      .order('time_taken',{ascending:true})
      .limit(10);

    if(!results?.length){section.innerHTML='<div style="color:var(--text3);font-size:.82rem;">No results yet — be the first!</div>';return;}

    section.innerHTML=results.map((r,i)=>`
      <div class="lb-row" style="${r.student_id===currentUser.id?'background:var(--blue-lt);border-radius:8px;padding:10px 8px;':''}">
        <div class="lb-rank">${RANK_ICONS[i]||i+1}</div>
        <div class="lb-name" style="color:${r.student_id===currentUser.id?'var(--blue-dk)':'var(--text)'}">${r.users?.full_name||'Student'}${r.student_id===currentUser.id?' (you)':''}</div>
        <div class="lb-score" style="color:${r.pct>=80?'var(--green-dk)':r.pct>=50?'var(--orange-dk)':'var(--red)'};">${r.score}/${r.total}</div>
        <div class="lb-time">${Math.floor(r.time_taken/60)}:${(r.time_taken%60).toString().padStart(2,'0')}</div>
      </div>`).join('');
  } catch(e){section.innerHTML=`<div style="color:var(--red);font-size:.82rem;">${e.message}</div>`;}
}

function getWeekNumber(){
  const d=new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate()+4-(d.getDay()||7));
  const yearStart=new Date(d.getFullYear(),0,1);
  return Math.ceil((((d-yearStart)/86400000)+1)/7);
}

function showXPPop(text){
  const el=document.createElement('div');
  el.className='xp-pop';
  el.style.color='var(--orange-dk)';
  el.textContent=text;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1300);
}

async function init(){
  try{
    const{data:{session}}=await sb.auth.getSession();
    if(!session){window.location.href='../../login.html';return;}
    const{data:profile}=await sb.from('users').select('*').eq('id',session.user.id).single();
    if(!profile||profile.role!=='student'){window.location.href='../../login.html';return;}
    currentUser={...profile,id:session.user.id};
    const ok=await checkSub(session.user.id);
    if(!ok) return;

    // Check if already done this week
    const week=getWeekNumber();
    const{data:done}=await sb.from('quiz_results')
      .select('id').eq('student_id',session.user.id).eq('week_number',week).limit(1);
    const alreadyDone=done?.length>0;

    const level=currentUser.current_level||1;
    const group=currentUser.age_group||(level<=1?'tiny':level<=4?'rising':'champions');
    showIntro(level,group,alreadyDone);
  }catch(err){
    document.getElementById('mainContent').innerHTML=`<div style="padding:40px;text-align:center;color:var(--red);">${err.message}</div>`;
  }
}

init();

  function toggleSidebar() {
    const s = document.getElementById('sidebar');
    const o = document.getElementById('overlay');
    s?.classList.toggle('open');
    o?.classList.toggle('show');
  }
  function closeSidebar() {
    document.getElementById('sidebar')?.classList.remove('open');
    document.getElementById('overlay')?.classList.remove('show');
  }
</script>
